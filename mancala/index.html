<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e2a17f">
  <title>Mancala</title>
  <link rel="stylesheet" href="css/mancala.css">
  <style>
    html, body { margin: 0; min-height: 100%; }
    body {
      background: #f4f6fb;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px 8px 40px;
    }
    #mancala { width: 100%; max-width: 820px; }
  </style>
</head>
<body>
  <div id="mancala"></div>

  <!-- Standalone host. In the hub, the shell calls init(container)/destroy() instead. -->
  <script type="module">
    import { init } from './js/ui.js';
    init(document.getElementById('mancala'));
  </script>
</body>
</html>
