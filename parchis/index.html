<script>
/*
 * Parchís rules engine (Spanish rules).
 *
 * Pure, deterministic, UI-free. No DOM, no timers, no randomness: the die value is
 * always an input. Every public function that changes state returns a NEW state and
 * never mutates its input. 01-RULES.md is the source of truth for the rules encoded
 * here; see HANDOFF-1.md for the ambiguities resolved and how.
 *
 * Loading: this file is a plain script (not an ES module) so test.html can run it by
 * double-clicking without file:// CORS issues, and Phase 5 can inline it into one
 * HTML file. It attaches its API to globalThis/window as `ParchisEngine` and, under
 * Node, to module.exports. See HANDOFF-1.md for why this replaces literal ES exports.
 */
(function () {
  "use strict";

  // ---------------------------------------------------------------------------
  // Board constants (hardcoded per 02-PHASE-1-ENGINE.md)
  // ---------------------------------------------------------------------------
  var COLORS = ["amarillo", "azul", "rojo", "verde"]; // fixed order: 0..3
  var PAWN_PREFIX = { amarillo: "A", azul: "Z", rojo: "R", verde: "V" };

  var SALIDA = { amarillo: 5, azul: 22, rojo: 39, verde: 56 };  // start squares
  var ENTRY = { amarillo: 68, azul: 17, rojo: 34, verde: 51 };  // last track square before corridor
  var SEGUROS = new Set([5, 12, 17, 22, 29, 34, 39, 46, 51, 56, 63, 68]);
  var TRACK_LEN = 68;
  var PASILLO_LEN = 7;

  // Linear coordinate landmarks (0 = on salida).
  var ENTRY_L = 63;   // every color reaches its entry after exactly 63 track steps
  var META_L = 71;    // 63 track + 7 pasillo + 1 = meta (pasillo position 8)

  function mod(a, n) { return ((a % n) + n) % n; }

  // ---------------------------------------------------------------------------
  // Coordinate model: the single source of path logic (requirement 1)
  // ---------------------------------------------------------------------------

  // Map a pawn location to its linear coordinate for the given color.
  // Returns null for casa (a casa pawn has no linear position).
  function toLinear(color, zone, pos) {
    if (zone === "track") return mod(pos - SALIDA[color], TRACK_LEN); // valid track L is 0..63
    if (zone === "pasillo") return ENTRY_L + pos;                     // pasillo 1..7 -> 64..70
    if (zone === "meta") return META_L;                              // 71
    return null; // casa
  }

  // Inverse of toLinear: a linear coordinate to a {zone, pos} square.
  function fromLinear(color, t) {
    if (t <= ENTRY_L) return { zone: "track", pos: mod(SALIDA[color] + t - 1, TRACK_LEN) + 1 };
    if (t <= META_L - 1) return { zone: "pasillo", pos: t - ENTRY_L };
    if (t === META_L) return { zone: "meta", pos: null };
    return null; // overshoot
  }

  // Ordered list of squares traversed advancing `steps` from `from` (start excluded,
  // destination included). Returns null on meta overshoot (exact count required).
  function path(color, from, steps) {
    var L = toLinear(color, from.zone, from.pos);
    if (L === null) return null; // casa cannot advance
    var target = L + steps;
    if (target > META_L) return null; // overshoot the meta
    var squares = [];
    for (var t = L + 1; t <= target; t++) squares.push(fromLinear(color, t));
    return squares;
  }

  // ---------------------------------------------------------------------------
  // Occupancy helpers
  // ---------------------------------------------------------------------------

  // Pawns physically on a square. For a track square, all colors are considered.
  // For a pasillo square, only the mover's color can be there (private corridor).
  function pawnsAtSquare(state, moverColor, sq) {
    var result = [];
    var i, j, player, pawn;
    if (sq.zone === "track") {
      for (i = 0; i < state.players.length; i++) {
        player = state.players[i];
        for (j = 0; j < player.pawns.length; j++) {
          pawn = player.pawns[j];
          if (pawn.zone === "track" && pawn.pos === sq.pos) {
            result.push({ color: player.color, pawn: pawn });
          }
        }
      }
    } else if (sq.zone === "pasillo") {
      for (i = 0; i < state.players.length; i++) {
        if (state.players[i].color !== moverColor) continue;
        player = state.players[i];
        for (j = 0; j < player.pawns.length; j++) {
          pawn = player.pawns[j];
          if (pawn.zone === "pasillo" && pawn.pos === sq.pos) {
            result.push({ color: moverColor, pawn: pawn });
          }
        }
      }
    }
    return result;
  }

  // A barrier is exactly two pawns of the SAME color on one square (seguro or not).
  function isBarrier(state, moverColor, sq) {
    var occ = pawnsAtSquare(state, moverColor, sq);
    return occ.length === 2 && occ[0].color === occ[1].color;
  }

  function findPawn(state, id) {
    for (var i = 0; i < state.players.length; i++) {
      var pawns = state.players[i].pawns;
      for (var j = 0; j < pawns.length; j++) {
        if (pawns[j].id === id) return { playerIdx: i, pawn: pawns[j] };
      }
    }
    return null;
  }

  // ---------------------------------------------------------------------------
  // Move computation
  // ---------------------------------------------------------------------------

  // Build an advance/bonus move for `pawn` moving `steps`, or null if illegal.
  // Barriers block every intermediate square (own barriers included); the
  // destination must not already hold two pawns; captures apply only to a single
  // opponent on a non-seguro track square.
  function computeMove(state, playerIdx, pawn, steps, kind) {
    var color = state.players[playerIdx].color;
    var from = { zone: pawn.zone, pos: pawn.pos };
    var sqs = path(color, from, steps);
    if (sqs === null || sqs.length === 0) return null;

    // Intermediate squares (every square except the destination): a barrier blocks passage.
    for (var i = 0; i < sqs.length - 1; i++) {
      if (isBarrier(state, color, sqs[i])) return null;
    }

    var dest = sqs[sqs.length - 1];
    var captures = null;
    var breaksBarrier = isBarrier(state, color, from); // leaving a barrier breaks it

    if (dest.zone !== "meta") {
      var occ = pawnsAtSquare(state, color, dest);
      if (occ.length >= 2) return null; // full square: a third pawn can never land
      if (occ.length === 1) {
        var other = occ[0];
        if (dest.zone === "track" && other.color !== color) {
          // Opponent on a track square: capture only off a seguro.
          if (!SEGUROS.has(dest.pos)) captures = other.pawn.id;
          // On a seguro they coexist (no capture).
        }
        // Same color (track or pasillo): landing forms a barrier (legal, handled on apply).
      }
    }

    return {
      pawnId: pawn.id,
      kind: kind,
      amount: steps,
      from: from,
      to: dest,
      captures: captures,
      breaksBarrier: breaksBarrier
    };
  }

  // Can the current player bring a pawn out of casa? Needs a casa pawn and fewer
  // than two of the player's OWN pawns already on the salida.
  function canEnter(state, playerIdx) {
    var player = state.players[playerIdx];
    var salida = SALIDA[player.color];
    var hasCasa = false;
    var ownOnSalida = 0;
    for (var i = 0; i < player.pawns.length; i++) {
      var p = player.pawns[i];
      if (p.zone === "casa") hasCasa = true;
      else if (p.zone === "track" && p.pos === salida) ownOnSalida++;
    }
    return hasCasa && ownOnSalida < 2;
  }

  // Build the enter move for a casa pawn (placement on the salida). Captures a lone
  // opponent, or the most recently arrived (higher arrivalSeq) of two opponents.
  function buildEnterMove(state, playerIdx, pawn) {
    var color = state.players[playerIdx].color;
    var salida = SALIDA[color];
    var occ = pawnsAtSquare(state, color, { zone: "track", pos: salida });
    var opp = occ.filter(function (o) { return o.color !== color; });
    var captures = null;
    if (opp.length === 1) {
      captures = opp[0].pawn.id;
    } else if (opp.length === 2) {
      captures = (opp[0].pawn.arrivalSeq >= opp[1].pawn.arrivalSeq ? opp[0] : opp[1]).pawn.id;
    }
    return {
      pawnId: pawn.id,
      kind: "enter",
      amount: 5,
      from: { zone: "casa", pos: null },
      to: { zone: "track", pos: salida },
      captures: captures,
      breaksBarrier: false
    };
  }

  function firstCasaPawn(player) {
    for (var i = 0; i < player.pawns.length; i++) {
      if (player.pawns[i].zone === "casa") return player.pawns[i];
    }
    return null;
  }

  function isOnBoard(pawn) { return pawn.zone === "track" || pawn.zone === "pasillo"; }

  function pawnInBarrier(state, color, pawn) {
    if (!isOnBoard(pawn)) return false;
    return isBarrier(state, color, { zone: pawn.zone, pos: pawn.pos });
  }

  // ---------------------------------------------------------------------------
  // Public: legalMoves
  // ---------------------------------------------------------------------------
  function legalMoves(state, die) {
    var phase = currentPhase(state);
    if (phase === "gameover") return [];

    var playerIdx = state.turn;
    var player = state.players[playerIdx];
    var color = player.color;
    var moves = [];
    var i, m, pawn;

    // Bonus phase: any on-board pawn may take the head bonus. No entry, no forced break.
    if (phase === "bonus") {
      var amount = state.bonusQueue[0];
      for (i = 0; i < player.pawns.length; i++) {
        pawn = player.pawns[i];
        if (!isOnBoard(pawn)) continue;
        m = computeMove(state, playerIdx, pawn, amount, "bonus");
        if (m) moves.push(m);
      }
      return moves;
    }

    // Roll phase.
    // Third consecutive six: no move at all (penalty handled by resolveNoMove).
    if (die === 6 && state.sixCount === 2) return [];

    var casaCount = 0;
    for (i = 0; i < player.pawns.length; i++) {
      if (player.pawns[i].zone === "casa") casaCount++;
    }
    // 6-as-7 only when zero pawns are in casa at the moment of the roll.
    var effective = (die === 6 && casaCount === 0) ? 7 : die;

    // Mandatory entry on a 5: if entry is legal it is the only move.
    if (die === 5 && canEnter(state, playerIdx)) {
      var enterer = firstCasaPawn(player);
      return [buildEnterMove(state, playerIdx, enterer)];
    }

    // Forced barrier break on a 6 (or 6-as-7): if any barrier pawn can move, only
    // barrier-pawn moves are allowed.
    if (die === 6) {
      var breakMoves = [];
      for (i = 0; i < player.pawns.length; i++) {
        pawn = player.pawns[i];
        if (!pawnInBarrier(state, color, pawn)) continue;
        m = computeMove(state, playerIdx, pawn, effective, "advance");
        if (m) breakMoves.push(m);
      }
      if (breakMoves.length > 0) return breakMoves;
    }

    // Normal advance moves.
    for (i = 0; i < player.pawns.length; i++) {
      pawn = player.pawns[i];
      if (!isOnBoard(pawn)) continue;
      m = computeMove(state, playerIdx, pawn, effective, "advance");
      if (m) moves.push(m);
    }
    return moves;
  }

  // ---------------------------------------------------------------------------
  // Public: applyMove
  // ---------------------------------------------------------------------------
  function clone(state) { return JSON.parse(JSON.stringify(state)); }

  function sendHome(pawn) {
    pawn.zone = "casa";
    pawn.pos = null;
    pawn.arrivalSeq = 0;
  }

  // Apply movement to the board (used by advance and bonus moves). Pushes earned
  // bonus amounts (20 capture, 10 meta) into `earned`.
  function applyAdvance(state, playerIdx, pawn, move, events, earned) {
    var color = state.players[playerIdx].color;

    if (move.captures) {
      sendHome(findPawn(state, move.captures).pawn);
    }
    pawn.zone = move.to.zone;
    pawn.pos = move.to.pos;
    pawn.arrivalSeq = ++state.seq;

    if (move.breaksBarrier) {
      events.push({ type: "barrierBroken", pawnId: move.pawnId, at: { zone: move.from.zone, pos: move.from.pos } });
    }

    if (move.to.zone === "meta") {
      events.push({ type: "reachedMeta", pawnId: move.pawnId });
      earned.push(10);
      events.push({ type: "bonusEarned", amount: 10 });
    } else {
      events.push({ type: "moved", pawnId: move.pawnId, to: { zone: move.to.zone, pos: move.to.pos } });
      if (move.captures) {
        events.push({ type: "captured", pawnId: move.pawnId, victimPawnId: move.captures });
        earned.push(20);
        events.push({ type: "bonusEarned", amount: 20 });
      }
      if (isBarrier(state, color, move.to)) {
        events.push({ type: "barrierFormed", color: color, at: { zone: move.to.zone, pos: move.to.pos } });
      }
    }
  }

  function applyEnter(state, playerIdx, pawn, move, events, earned) {
    var color = state.players[playerIdx].color;
    var salida = SALIDA[color];

    if (move.captures) {
      sendHome(findPawn(state, move.captures).pawn);
    }
    pawn.zone = "track";
    pawn.pos = salida;
    pawn.arrivalSeq = ++state.seq;

    events.push({ type: "entered", pawnId: move.pawnId, to: { zone: "track", pos: salida } });
    if (move.captures) {
      events.push({ type: "captured", pawnId: move.pawnId, victimPawnId: move.captures });
      earned.push(20);
      events.push({ type: "bonusEarned", amount: 20 });
    }
    if (isBarrier(state, color, { zone: "track", pos: salida })) {
      events.push({ type: "barrierFormed", color: color, at: { zone: "track", pos: salida } });
    }
  }

  function applyMove(state, move) {
    var s = clone(state);
    var events = [];
    var playerIdx = s.turn;
    var pawn = findPawn(s, move.pawnId).pawn;
    var earned = [];

    if (move.kind === "enter") {
      applyEnter(s, playerIdx, pawn, move, events, earned);
      s.lastMovedPawnId = move.pawnId; // die-roll move
      s.pendingReroll = false;         // a 5 never owes a re-roll
    } else if (move.kind === "advance") {
      applyAdvance(s, playerIdx, pawn, move, events, earned);
      s.lastMovedPawnId = move.pawnId; // die-roll move
      var isSix = (move.amount === 6 || move.amount === 7); // a raw 6 was rolled
      s.pendingReroll = isSix;         // reflects this roll; a non-6 clears any owed re-roll
      if (isSix) s.sixCount += 1;
    } else if (move.kind === "bonus") {
      applyAdvance(s, playerIdx, pawn, move, events, earned);
      // A bonus is not a die roll: lastMovedPawnId, sixCount, pendingReroll untouched.
    }

    // Bonus queue: for a bonus move remove the resolved head first, then append newly
    // earned bonuses to the back (FIFO: new bonuses queue behind any already pending).
    if (move.kind === "bonus") {
      s.bonusQueue = s.bonusQueue.slice(1).concat(earned);
    } else {
      s.bonusQueue = s.bonusQueue.concat(earned);
    }

    resolveAfterMove(s, events);
    return { state: s, events: events };
  }

  // After a move settles: record a finish, end the game at three finishers, stay in
  // the bonus phase while bonuses remain, otherwise resolve the roll (re-roll or pass).
  function resolveAfterMove(state, events) {
    var playerIdx = state.turn;
    var player = state.players[playerIdx];
    var allMeta = player.pawns.every(function (p) { return p.zone === "meta"; });
    if (allMeta && state.winners.indexOf(playerIdx) === -1) {
      state.winners.push(playerIdx);
      events.push({ type: "playerFinished", player: playerIdx });
    }
    if (state.winners.length >= 3) {
      events.push({ type: "gameOver", winners: state.winners.slice() });
      return;
    }
    if (state.bonusQueue.length > 0) return; // stay in bonus phase
    finishRollResolution(state, events);
  }

  function finishRollResolution(state, events) {
    var currentFinished = state.winners.indexOf(state.turn) !== -1;
    if (state.pendingReroll && !currentFinished) {
      // Same player rolls again. pendingReroll stays true (a re-roll is owed) and is
      // reset by the next die-roll move; sixCount is preserved for the consecutive count.
      return;
    }
    state.pendingReroll = false;
    state.sixCount = 0;
    state.bonusQueue = [];
    nextTurn(state);
    events.push({ type: "turnPassed", to: state.turn });
  }

  function nextTurn(state) {
    var t = state.turn;
    for (var i = 0; i < state.players.length; i++) {
      t = (t + 1) % state.players.length;
      if (state.winners.indexOf(t) === -1) break;
    }
    state.turn = t;

  // ---------------------------------------------------------------------------
  // Public: resolveNoMove
  // ---------------------------------------------------------------------------
  function resolveNoMove(state, die) {
    var s = clone(state);
    var events = [];
    var phase = currentPhase(state);
    if (phase === "gameover") return { state: s, events: events };

    if (phase === "bonus") {
      var forfeited = s.bonusQueue[0];
      s.bonusQueue = s.bonusQueue.slice(1);
      events.push({ type: "bonusForfeited", amount: forfeited });
      if (s.bonusQueue.length === 0) finishRollResolution(s, events);
      return { state: s, events: events };
    }

    // Roll phase.
    if (die === 6 && s.sixCount === 2) { // third consecutive six
      applyThreeSixesPenalty(s, events);
      return { state: s, events: events };
    }
    if (die === 6) {
      // A 6 with no legal move still counts as a consecutive six and grants the re-roll.
      s.sixCount += 1;
      s.pendingReroll = true;
      return { state: s, events: events }; // same player, no turnPassed
    }
    // Non-6 with no legal move: the turn passes.
    s.sixCount = 0;
    s.pendingReroll = false;
    nextTurn(s);
    events.push({ type: "turnPassed", to: s.turn });
    return { state: s, events: events };
  }

  function applyThreeSixesPenalty(state, events) {
    var sentPawnId = null;
    if (state.lastMovedPawnId != null) {
      var found = findPawn(state, state.lastMovedPawnId);
      if (found && found.pawn.zone === "track") { // pasillo and meta are immune
        sendHome(found.pawn);
        sentPawnId = found.pawn.id;
      }
    }
    events.push({ type: "threeSixesPenalty", pawnId: sentPawnId });
    state.bonusQueue = [];
    state.pendingReroll = false;
    state.sixCount = 0;
    nextTurn(state);
    events.push({ type: "turnPassed", to: state.turn });
  }

  // ---------------------------------------------------------------------------
  // Public: phase / bonus queries, new game, serialization
  // ---------------------------------------------------------------------------
  function currentPhase(state) {
    if (state.winners.length >= 3) return "gameover";
    if (state.bonusQueue.length > 0) return "bonus";
    return "roll";
  }

  function pendingBonus(state) {
    return state.bonusQueue.length > 0 ? state.bonusQueue[0] : null;
  }

  function newGame(humanSeats) {
    var players = COLORS.map(function (color) {
      var pawns = [];
      for (var n = 1; n <= 4; n++) {
        pawns.push({ id: PAWN_PREFIX[color] + n, zone: "casa", pos: null, arrivalSeq: 0 });
      }
      return { color: color, pawns: pawns };
    });
    return {
      players: players,
      turn: 0,
      sixCount: 0,
      bonusQueue: [],
      pendingReroll: false,
      lastMovedPawnId: null,
      seq: 0,
      winners: [],
      humanSeats: humanSeats ? humanSeats.slice() : []
    };
  }

  function serialize(state) { return JSON.stringify(state); }
  function deserialize(json) { return JSON.parse(json); }

  // ---------------------------------------------------------------------------
  // Export
  // ---------------------------------------------------------------------------
  var ParchisEngine = {
    newGame: newGame,
    legalMoves: legalMoves,
    applyMove: applyMove,
    resolveNoMove: resolveNoMove,
    currentPhase: currentPhase,
    pendingBonus: pendingBonus,
    serialize: serialize,
    deserialize: deserialize,
    // Internals exposed for unit testing only.
    _internal: {
      path: path,
      toLinear: toLinear,
      fromLinear: fromLinear,
      findPawn: findPawn,
      pawnsAtSquare: pawnsAtSquare,
      isBarrier: isBarrier,
      computeMove: computeMove,
      canEnter: canEnter,
      SALIDA: SALIDA,
      ENTRY: ENTRY,
      SEGUROS: SEGUROS,
      TRACK_LEN: TRACK_LEN,
      PASILLO_LEN: PASILLO_LEN,
      COLORS: COLORS,
      PAWN_PREFIX: PAWN_PREFIX
    }
  };

  if (typeof globalThis !== "undefined") globalThis.ParchisEngine = ParchisEngine;
  if (typeof window !== "undefined") window.ParchisEngine = ParchisEngine;
  if (typeof module !== "undefined" && module.exports) module.exports = ParchisEngine;
})();

<script>
/*

 * numbers 1..68 is verified by verifyCoords(), which throws on any violation of the engine
 * constants (salidas 5/22/39/56, entries 68/17/34/51, seguros set, corridor adjacency).
 *
 * Grid model: a 19x19 cell grid. Four 8x8 casas in the corners, a 3-wide cross between
 * them, a 3x3 central meta. Each arm is 3 wide and 8 long: the two outer lanes are track
 * (8 + 8), the outermost middle cell is the track "tip" (1), giving 17 track squares per
 * arm; the inner 7 middle cells are that arm's corridor (pasillo), running from the tip

  "use strict";

  var ENTRY  = { amarillo: 68, azul: 17, rojo: 34, verde: 51 };

  var TRACK_LEN = 68, PASILLO_LEN = 7, GRID = 19;

  // We define an arm by its geometry vectors on the grid:
  //   base: grid cell (col,row) of the inner track cell on the OUTBOUND lane (near center)
  //   out:  unit vector pointing outward (base -> tip)
  //   side: unit vector from the outbound lane across to the inbound lane
  // The corridor is the middle lane (between outbound and inbound), and the pawn turns
  // into it near the tip, walking inward to the meta.
  //
  // Board bands: casa cols/rows 0..7 and 11..18; the cross occupies the middle band 8..10.
  // Center 3x3 is cols 8..10, rows 8..10.
  //

  // per-arm traversal so the continuous track reads 1..68 with a tunable global offset.

  // Arm frames (pure geometry). Outbound lane and inbound lane are the two outer lanes;
  // travel goes base -> tip along outbound, across the tip, tip -> base along inbound.
  // Clockwise around the board: top (out up), right (out right), bottom (out down),
  // left (out left). For clockwise travel the outbound lane is chosen so that leaving one
  // arm's inbound base connects to the next arm's outbound base.

    // tip middle col (9) row 0. Travel: up col8 (base row7 -> tip row0), across, down col10.
    top:    { outLaneCol: 8, inLaneCol: 10, midCol: 9, vertical: true,  baseRow: 7, tipRow: 0 },
    // RIGHT arm: block cols 11..18, rows 8..10. Outbound = top row (8), inbound = bottom row (10),
    // mid row 9, tip col 18. Travel: right along row8 (base col11 -> tip col18), across, left along row10.
    right:  { outLaneRow: 8, inLaneRow: 10, midRow: 9, vertical: false, baseCol: 11, tipCol: 18 },
    // BOTTOM arm: block cols 8..10, rows 11..18. Outbound = right col (10), inbound = left col (8),
    // mid col 9, tip row 18. Travel: down col10 (base row11 -> tip row18), across, up col8.
    bottom: { outLaneCol: 10, inLaneCol: 8, midCol: 9, vertical: true,  baseRow: 11, tipRow: 18 },
    // LEFT arm: block cols 0..7, rows 8..10. Outbound = bottom row (10), inbound = top row (8),
    // mid row 9, tip col 0. Travel: left along row10 (base col7 -> tip col0), across, right along row8.

      // tip (1 cell) on the mid column at the tip row

    COLORS.forEach(function (color) {

  function highlightMoves(moves) {
    ensureMarks();
    var place = Board.pawnPlacement(Board.coords(), G.state);
    var seen = {};
    moves.forEach(function (m) {
      if (!seen[m.pawnId]) { seen[m.pawnId] = true; if (place[m.pawnId]) addRing(place[m.pawnId], "pc-pawnmark", cell() * 0.5); }
      var d = destCenter(m);
      if (d) addRing(d, "pc-destmark", cell() * 0.42);
    });
  }
  function clearHighlights() { clearMarks(); }

  // ---- HUD sync ------------------------------------------------------------
  function syncHud() {
    HUD.setTurn(curColor(), nameOf(curColor()));
    HUD.setPips(G.state.sixCount);
    HUD.setBonus(Engine.currentPhase(G.state) === "bonus" ? Engine.pendingBonus(G.state) : null);
  }

  // ---- main loop -----------------------------------------------------------
  function advance() {
    render();
    syncHud();
    var phase = Engine.currentPhase(G.state);
    if (phase === "gameover") { G.ui = "gameover"; onGameOver(); return; }
    if (phase === "bonus") { beginBonus(); return; }
    beginRoll();
  }

  function beginRoll() {
    G.ui = "awaitRoll";
    G.die = null;
    if (isAI(G.state.turn)) {
      HUD.setDie(null, false);
      HUD.toast(nameOf(curColor()) + " piensa...", { ms: 1100 });
      var wait = 500 + Math.random() * 300;
      setTimeout(function () { if (G.ui === "awaitRoll" && isAI(G.state.turn)) aiRoll(); }, wait);
    } else {
      HUD.setDie(null, true);
      HUD.toast("Turno de " + nameOf(curColor()), { ms: 1200 });
    }
  }
  function aiRoll() {
    G.ui = "rolling";
    var d = 1 + Math.floor(Math.random() * 6);
    HUD.rollAnim(d, function () { afterRoll(d); });
  }

  function onRollTap() {
    if (G.ui !== "awaitRoll" || isAI(G.state.turn)) return;
    G.ui = "rolling";
    var d = 1 + Math.floor(Math.random() * 6);
    HUD.rollAnim(d, function () { afterRoll(d); });
  }

  function afterRoll(d) {
    G.die = d;
    HUD.setDie(d, false);
    var moves = Engine.legalMoves(G.state, d);
    if (moves.length === 0) { handleNoMove(d); return; }
    G.moves = moves;
    if (isAI(G.state.turn)) { aiPlay(moves); return; }
    G.ui = "showingMoves";
    highlightMoves(moves);
    if (moves.length === 1) setTimeout(function () { applyChosen(moves[0]); }, 400); // beat to read the die
  }
  function aiPlay(moves) {
    G.ui = "showingMoves";
    highlightMoves(moves);
    var move = window.ParchisAI.chooseMove(G.state, G.die || 0, moves, G.settings.difficulty);
    var wait = 500 + Math.random() * 300;
    setTimeout(function () { if (G.ui === "showingMoves") applyChosen(move); }, wait);
  }

  function handleNoMove(d) {
    if (d === 6 && G.state.sixCount === 2) {
      // three sixes: penalty (engine decides which pawn, if any)
      var res = Engine.resolveNoMove(G.state, d);
      var pen = res.events.filter(function (e) { return e.type === "threeSixesPenalty"; })[0];
      HUD.toast("Tres seises", { kind: "warn", ms: 1600 });
      G.ui = "animating";
      var chain = Promise.resolve();
      if (pen && pen.pawnId) {
        var g = pawnEl(pen.pawnId); markStart(g);
        var home = Board.pawnPlacement(Board.coords(), res.state)[pen.pawnId];
        chain = flyHome(g, home);
      }
      chain.then(function () { commit(res.state); });
      return;
    }
    HUD.toast("Sin movimiento", { ms: 1400 });
    G.ui = "animating";
    setTimeout(function () {
      var res = Engine.resolveNoMove(G.state, d);
      commit(res.state);
    }, 900);
  }

  function beginBonus() {
    var amount = Engine.pendingBonus(G.state);
    HUD.toast("¡Bono de " + amount + "!", { kind: "bonus", ms: 1500 });
    var moves = Engine.legalMoves(G.state, 0);
    if (moves.length === 0) {
      G.ui = "animating";
      var res = Engine.resolveNoMove(G.state, 0);
      HUD.toast("Bono perdido", { ms: 1400 });
      setTimeout(function () { commit(res.state); }, 700);
      return;
    }
    G.moves = moves;
    if (isAI(G.state.turn)) { aiPlay(moves); return; }
    G.ui = "showingMoves"; highlightMoves(moves);
    if (moves.length === 1) setTimeout(function () { applyChosen(moves[0]); }, 450);
  }

  // ---- applying a move + animating -----------------------------------------
  function applyChosen(move) {
    if (G.ui !== "showingMoves") return;
    clearHighlights();
    G.ui = "animating";
    var oldState = G.state;
    var res = Engine.applyMove(oldState, move);
    animateTransition(oldState, res.state, res.events, move).then(function () { commit(res.state); });
  }

  async function animateTransition(oldState, newState, events, move) {
    var c = color(oldState.turn);
    var heroId = move.pawnId;
    var heroG = pawnEl(heroId);
    var placeOld = Board.pawnPlacement(Board.coords(), oldState);
    var placeNew = Board.pawnPlacement(Board.coords(), newState);

    // 1. hero movement
    var pts = [placeOld[heroId]];
    if (move.kind === "enter") {
      pts.push(centerOf(c, move.to));
    } else {
      var path = Engine._internal.path(c, move.from, move.amount) || [];
      path.forEach(function (sq) { pts.push(centerOf(c, sq)); });
    }
    if (heroG) await hopThrough(heroG, pts, 72);

    // 2. capture (victim flies home) + toast
    var cap = events.filter(function (e) { return e.type === "captured"; })[0];
    if (cap) {
      HUD.toast("¡Te como!", { kind: "capture", badge: "+20", ms: 1600 });
      var vg = pawnEl(cap.victimPawnId);
      if (vg) { markStart(vg); await flyHome(vg, placeNew[cap.victimPawnId]); }
    }

    // 3. barrier / meta feedback
    if (events.some(function (e) { return e.type === "barrierFormed"; })) HUD.toast("¡Barrera!", { kind: "barrier", ms: 1300 });
    if (events.some(function (e) { return e.type === "reachedMeta"; })) {
      HUD.toast("¡A la meta!", { kind: "meta", badge: "+10", ms: 1600 });
      if (heroG) await celebrate(heroG);
    }
    if (events.some(function (e) { return e.type === "playerFinished"; })) {
      HUD.toast("¡" + nameOf(c) + " termina!", { kind: "meta", ms: 1800 });
    }
  }

  function commit(newState) {
    G.state = newState;
    save();
    advance();
  }

  // ---- board tap handling --------------------------------------------------
  function tapPoint(evt) {
    var pt = svg.createSVGPoint();
    var src = (evt.touches && evt.touches[0]) || (evt.changedTouches && evt.changedTouches[0]) || evt;
    pt.x = src.clientX; pt.y = src.clientY;
    var ctm = svg.getScreenCTM();
    if (!ctm) return null;
    var p = pt.matrixTransform(ctm.inverse());
    var off = groupOffset();
    return { x: p.x - off, y: p.y - off };
  }

  function onBoardPointer(evt) {
    if (G.ui !== "showingMoves" || isAI(G.state.turn)) return;
    var p = tapPoint(evt);
    if (!p) return;
    evt.preventDefault();
    var place = Board.pawnPlacement(Board.coords(), G.state);
    var best = null, bestD = Infinity;
    G.moves.forEach(function (m) {
      var targets = [place[m.pawnId], destCenter(m)];
      targets.forEach(function (c) { if (!c) return; var d = dist(p, c); if (d < bestD) { bestD = d; best = m; } });
    });
    var TH = cell() * 1.9;
    if (best && bestD <= TH) { applyChosen(best); return; }
    // illegal tap: nearest current-player pawn -> explain
    var cur = G.state.players[G.state.turn], ip = null, ipD = Infinity;
    cur.pawns.forEach(function (pw) {
      var c2 = place[pw.id]; if (!c2) return; var d = dist(p, c2); if (d < ipD) { ipD = d; ip = pw; }
    });
    if (ip && ipD <= TH) explainIllegal(ip);
  }

  function jsShake(g) {
    if (!g) return;
    var p = curTranslate(g), seq = [7, -7, 5, -5, 3, -3, 0], i = 0;
    var iv = setInterval(function () { setT(g, p.x + seq[i], p.y); i++; if (i >= seq.length) { clearInterval(iv); setT(g, p.x, p.y); } }, 38);
  }
  function explainIllegal(pawn) {
    jsShake(pawnEl(pawn.id));
    var msg;
    if (G.moves.length && G.moves[0].kind === "enter") msg = "Con 5 es obligatorio salir";
    else if (G.moves.length && G.moves.every(function (m) { return m.breaksBarrier; })) msg = "Debes romper la barrera";
    else {
      var c = curColor();
      if (pawn.zone === "casa") msg = "Necesitas un 5 para salir";
      else {
        var casaOut = G.state.players[G.state.turn].pawns.every(function (p) { return p.zone !== "casa"; });
        var eff = (G.die === 6 && casaOut) ? 7 : G.die;
        var path = Engine._internal.path(c, { zone: pawn.zone, pos: pawn.pos }, eff);
        if (path === null) msg = "Necesitas cuenta exacta";
        else if (path.some(function (sq) { return Engine._internal.isBarrier(G.state, c, sq); })) msg = "Barrera bloquea";
        else msg = "Movimiento no permitido";
      }
    }
    HUD.toast(msg, { kind: "warn", ms: 1600 });
  }

  // ---- persistence ---------------------------------------------------------
  function save() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ state: G.state, settings: G.settings }));
    } catch (e) { /* storage unavailable; degrade silently */ }
  }
  function loadSaved() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (!obj || !obj.state) return null;
      return obj;
    } catch (e) { return null; }
  }
  function clearSaved() { try { localStorage.removeItem(STORE_KEY); } catch (e) { } }

  // ---- lifecycle -----------------------------------------------------------
  function startNewGame(settings) {
    G.settings = settings || G.settings || defaultSettings();
    G.state = Engine.newGame(G.settings.humanSeats);
    G.state.humanSeats = G.settings.humanSeats.slice();
    clearSaved(); save();
    HUD.clearToast();
    advance();
  }
  function continueGame(saved) {
    G.settings = saved.settings || defaultSettings();
    G.state = saved.state;
    advance();
  }

  function bindInput() {
    svg.addEventListener("pointerdown", onBoardPointer);
  }

  var Game = {};
  Game.init = function (refs) {
    Engine = window.ParchisEngine; Board = window.ParchisBoard; HUD = window.ParchisHUD; Theme = window.ParchisTheme;
    svg = refs.svg;
    G.settings = defaultSettings();
    HUD.build(refs, {
      onRollTap: onRollTap,
      onNewGame: function () { startNewGame(G.settings); },
      onSettings: function (s) { G.settings = s; if (G.state) { G.state.humanSeats = s.humanSeats.slice(); save(); syncHud(); } },
      getSettings: function () { return G.settings; }
    });
    // seed a static board so the frame is visible behind the prompt
    G.state = Engine.newGame(G.settings.humanSeats);
    render();
    bindInput();

    var saved = loadSaved();
    if (saved && saved.state && Engine.currentPhase(saved.state) !== "gameover") {
      HUD.prompt("Parchís", "Hay una partida sin terminar.", [
        { label: "Continuar partida", onClick: function () { continueGame(saved); } },
        { label: "Nueva partida", kind: "ghost", onClick: function () { startNewGame(G.settings); } }
      ]);
    } else {
      startNewGame(G.settings);
    }
  };

  function onGameOver() {
    clearHighlights();
    HUD.setDie(null, false);
    clearSaved();
    HUD.gameover(G.state.winners.map(function (i) { return color(i); }), namesByColor(), function () { startNewGame(G.settings); });
  }
  function namesByColor() { var o = {}; ["amarillo", "azul", "rojo", "verde"].forEach(function (c) { o[c] = nameOf(c); }); return o; }

  if (typeof window !== "undefined") window.ParchisGame = Game;
})();
</script>
<script>
  window.ParchisGame.init({
    header: document.getElementById("hdr"),
    control: document.getElementById("control"),
    toast: document.getElementById("toast"),
    overlay: document.getElementById("overlay"),
    svg: document.getElementById("board")
  });
</script>
</body>
