<script>
/*
 * Parchis rules engine (DUAL MODE: Spanish one-die, American two-dice).
 *
 * Pure, deterministic, UI-free. No DOM, no timers, no randomness: the dice values
 * are always an input. Every public function that changes state returns a NEW state
 * and never mutates its input. 11-RULES-DUAL-MODE.md is the source of truth for both
 * rulesets (it supersedes 01-RULES.md); see HANDOFF-R2-1.md for the ambiguities
 * resolved and how.
 *
 * Structure: a mode-independent CORE (coordinate model, occupancy, move computation,
 * bonus queue, winners/rotation, serialization) plus two small mode modules held in
 * MODES: each implements dice/roll handling, entry rules, the extra-roll trigger, the
 * triple-roll penalty, forced-break policy, and (American only) dice sequencing. The
 * public API dispatches to MODES[state.mode] wherever behaviour diverges.
 *
 * Loading: this file is a plain script (not an ES module) so test.html can run it by
 * double-clicking without file:// CORS issues, and the build can inline it into one
 * HTML file. It attaches its API to globalThis/window as `ParchisEngine` and, under
 * Node, to module.exports. See HANDOFF-1.md for why this replaces literal ES exports.
 */
(function () {
  "use strict";

  // ---------------------------------------------------------------------------
  // Board constants (shared by both modes; 11-RULES common core)
  // ---------------------------------------------------------------------------
  var COLORS = ["amarillo", "azul", "rojo", "verde"]; // fixed order: 0..3
  var PAWN_PREFIX = { amarillo: "A", azul: "Z", rojo: "R", verde: "V" };

  var SALIDA = { amarillo: 5, azul: 22, rojo: 39, verde: 56 };  // start squares
  var ENTRY = { amarillo: 68, azul: 17, rojo: 34, verde: 51 };  // last track square before corridor
  var SEGUROS = new Set([5, 12, 17, 22, 29, 34, 39, 46, 51, 56, 63, 68]);
  var TRACK_LEN = 68;
  var PASILLO_LEN = 7;

  // Linear coordinate landmarks (0 = on salida).
  var ENTRY_L = 63;   // every color reaches its entry after exactly 63 track steps
  var META_L = 71;    // 63 track + 7 pasillo + 1 = meta (pasillo position 8)

  function mod(a, n) { return ((a % n) + n) % n; }

  // ===========================================================================
  // CORE: coordinate model (the single source of path logic)
  // ===========================================================================

  // Map a pawn location to its linear coordinate for the given color.
  // Returns null for casa (a casa pawn has no linear position).
  function toLinear(color, zone, pos) {
    if (zone === "track") return mod(pos - SALIDA[color], TRACK_LEN); // valid track L is 0..63
    if (zone === "pasillo") return ENTRY_L + pos;                     // pasillo 1..7 -> 64..70
    if (zone === "meta") return META_L;                              // 71
    return null; // casa
  }

  // Inverse of toLinear: a linear coordinate to a {zone, pos} square.
  function fromLinear(color, t) {
    if (t <= ENTRY_L) return { zone: "track", pos: mod(SALIDA[color] + t - 1, TRACK_LEN) + 1 };
    if (t <= META_L - 1) return { zone: "pasillo", pos: t - ENTRY_L };
    if (t === META_L) return { zone: "meta", pos: null };
    return null; // overshoot
  }

  // Ordered list of squares traversed advancing `steps` from `from` (start excluded,
  // destination included). Returns null on meta overshoot (exact count required).
  function path(color, from, steps) {
    var L = toLinear(color, from.zone, from.pos);
    if (L === null) return null; // casa cannot advance
    var target = L + steps;
    if (target > META_L) return null; // overshoot the meta
    var squares = [];
    for (var t = L + 1; t <= target; t++) squares.push(fromLinear(color, t));
    return squares;
  }

  // ===========================================================================
  // CORE: occupancy helpers
  // ===========================================================================

  // Pawns physically on a square. For a track square, all colors are considered.
  // For a pasillo square, only the mover's color can be there (private corridor).
  function pawnsAtSquare(state, moverColor, sq) {
    var result = [];
    var i, j, player, pawn;
    if (sq.zone === "track") {
      for (i = 0; i < state.players.length; i++) {
        player = state.players[i];
        for (j = 0; j < player.pawns.length; j++) {
          pawn = player.pawns[j];
          if (pawn.zone === "track" && pawn.pos === sq.pos) {
            result.push({ color: player.color, pawn: pawn });
          }
        }
      }
    } else if (sq.zone === "pasillo") {
      for (i = 0; i < state.players.length; i++) {
        if (state.players[i].color !== moverColor) continue;
        player = state.players[i];
        for (j = 0; j < player.pawns.length; j++) {
          pawn = player.pawns[j];
          if (pawn.zone === "pasillo" && pawn.pos === sq.pos) {
            result.push({ color: moverColor, pawn: pawn });
          }
        }
      }
    }
    return result;
  }

  // A barrier (barrera / blockade) is exactly two pawns of the SAME color on one
  // square (seguro or not). Identical in both modes.
  function isBarrier(state, moverColor, sq) {
    var occ = pawnsAtSquare(state, moverColor, sq);
    return occ.length === 2 && occ[0].color === occ[1].color;
  }

  function findPawn(state, id) {
    for (var i = 0; i < state.players.length; i++) {
      var pawns = state.players[i].pawns;
      for (var j = 0; j < pawns.length; j++) {
        if (pawns[j].id === id) return { playerIdx: i, pawn: pawns[j] };
      }
    }
    return null;
  }

  function isOnBoard(pawn) { return pawn.zone === "track" || pawn.zone === "pasillo"; }

  function firstCasaPawn(player) {
    for (var i = 0; i < player.pawns.length; i++) {
      if (player.pawns[i].zone === "casa") return player.pawns[i];
    }
    return null;
  }

  function uniqueValues(arr) {
    var out = [];
    for (var i = 0; i < arr.length; i++) if (out.indexOf(arr[i]) === -1) out.push(arr[i]);
    return out;
  }

  // ===========================================================================
  // CORE: move computation (mode-aware only in the safety-square policy)
  // ===========================================================================

  // Build an advance/bonus move for `pawn` moving `steps`, or null if illegal.
  // Barriers block every intermediate square (own barriers included); the
  // destination must not already hold two pawns. Capture / safety behaviour on the
  // destination depends on the mode:
  //   Spanish  - an opponent on a seguro is shared peacefully (land, no capture);
  //              an opponent on a non-seguro track square is captured.
  //   American - a seguro holding any opponent CANNOT be landed on (safety excludes
  //              opponents); an opponent on a non-seguro track square is captured.
  function computeMove(state, playerIdx, pawn, steps, kind) {
    var color = state.players[playerIdx].color;
    var from = { zone: pawn.zone, pos: pawn.pos };
    var sqs = path(color, from, steps);
    if (sqs === null || sqs.length === 0) return null;

    // Intermediate squares (every square except the destination): a barrier blocks
    // passage. A lone pawn (even an opponent on a seguro) never blocks passage.
    for (var i = 0; i < sqs.length - 1; i++) {
      if (isBarrier(state, color, sqs[i])) return null;
    }

    var dest = sqs[sqs.length - 1];
    var captures = null;
    var breaksBarrier = isBarrier(state, color, from); // leaving a barrier breaks it

    if (dest.zone !== "meta") {
      var occ = pawnsAtSquare(state, color, dest);
      if (occ.length >= 2) return null; // full square: a third pawn can never land
      if (occ.length === 1) {
        var other = occ[0];
        if (dest.zone === "track" && other.color !== color) {
          var onSeguro = SEGUROS.has(dest.pos);
          if (state.mode === "american") {
            if (onSeguro) return null;     // safety excludes opponents: cannot land
            captures = other.pawn.id;      // non-seguro opponent: capture
          } else {                          // spanish
            if (!onSeguro) captures = other.pawn.id; // seguro: coexist, no capture
          }
        }
        // Same color (track or pasillo): landing forms a barrier (legal).
      }
    }

    return {
      pawnId: pawn.id,
      kind: kind,
      amount: steps,
      from: from,
      to: dest,
      captures: captures,
      breaksBarrier: breaksBarrier
    };
  }

  // Can the current player bring a pawn out of casa? Needs a casa pawn and fewer
  // than two of the player's OWN pawns already on the salida. Same in both modes.
  function canEnter(state, playerIdx) {
    var player = state.players[playerIdx];
    var salida = SALIDA[player.color];
    var hasCasa = false;
    var ownOnSalida = 0;
    for (var i = 0; i < player.pawns.length; i++) {
      var p = player.pawns[i];
      if (p.zone === "casa") hasCasa = true;
      else if (p.zone === "track" && p.pos === salida) ownOnSalida++;
    }
    return hasCasa && ownOnSalida < 2;
  }

  // Build the enter move for a casa pawn (placement on the salida). Captures a lone
  // opponent, or the most recently arrived (higher arrivalSeq) of two opponents.
  // The salida-entry capture is the one capture allowed on a seguro, in both modes.
  function buildEnterMove(state, playerIdx, pawn) {
    var color = state.players[playerIdx].color;
    var salida = SALIDA[color];
    var occ = pawnsAtSquare(state, color, { zone: "track", pos: salida });
    var opp = occ.filter(function (o) { return o.color !== color; });
    var captures = null;
    if (opp.length === 1) {
      captures = opp[0].pawn.id;
    } else if (opp.length === 2) {
      captures = (opp[0].pawn.arrivalSeq >= opp[1].pawn.arrivalSeq ? opp[0] : opp[1]).pawn.id;
    }
    return {
      pawnId: pawn.id,
      kind: "enter",
      amount: 5,
      from: { zone: "casa", pos: null },
      to: { zone: "track", pos: salida },
      captures: captures,
      breaksBarrier: false
    };

      applyAdvance(s, playerIdx, pawn, move, events, earned);

    }

    // earned bonuses to the back (FIFO: new bonuses queue behind any already pending).
    if (move.kind === "bonus") {

  function finishTurn(state, events) {

      // the spent dice back to the roll phase; the consecutive counter persists so the
      // triple-roll penalty can be detected.

    s.dice = [];

  }

  // ===========================================================================
  // CORE: winners / phase / bonus queries, new game, serialization
  // ===========================================================================
  function currentPhase(state) {

    if (state.bonusQueue.length > 0) return "bonus";

  }

      players: players,
      turn: 0,
      dice: [],               // unused dice of the current roll (empty in the roll phase)
      sixCount: 0,            // Spanish: consecutive sixes this turn (third triggers the penalty)
      doublesCount: 0,       // American: consecutive doubles this turn (third triggers the penalty)
      bonusQueue: [],
      pendingReroll: false,   // an extra roll is owed after the current roll resolves
      brokenBarrier: null,    // American: the blockade broken by the first doubles die (re-form guard)
      lastMovedPawnId: null,  // Spanish three-sixes target

  // ===========================================================================

    if (d === 5 && canEnter(state, playerIdx)) {

  // ===========================================================================

  function americanRoll(s, arr, events) {

  // shared track (highest linear progress) back to the nest. Home row and meta are

  // one sum-entry when both dice remain and sum to 5. usesDice holds die indices.
  function americanRawPlies(state) {

    var player = state.players[playerIdx];

      for (i = 0; i < player.pawns.length; i++) {
        pawn = player.pawns[i];
        if (!isOnBoard(pawn)) continue;
        m = computeMove(state, playerIdx, pawn, v, "advance");
        if (m) { m.usesDice = [di]; plies.push(m); }
      }

        e.usesDice = [di]; plies.push(e);

    if (dice.length === 2 && canEnter(state, playerIdx) && (dice[0] + dice[1]) === 5) {

  function dedupePlies(state, plies) {

      var key = p.pawnId + "|" + p.kind + "|" + p.to.zone + "|" + p.to.pos + "|" + (p.captures || "") + "|" + vals.join(",");

  // pawn and consumes the die, ignoring bonuses and turn resolution, so the remaining
  // die's legality can be tested on the resulting board.
  function simulatePly(state, ply) {
    var s = clone(state);
    var pawn = findPawn(s, ply.pawnId).pawn;

    } else {

  }

  // `p` just broke (both original members from one square onto one new square)?
  function isReformSequence(state, p, q) {
    if (!isDoublesState(state)) return false;
    if (!p.breaksBarrier) return false;
    if (p.kind === "enter" || q.kind === "enter") return false;
    if (q.pawnId === p.pawnId) return false;
    if (q.from.zone !== p.from.zone || q.from.pos !== p.from.pos) return false; // same origin square
    if (q.to.zone !== p.to.zone || q.to.pos !== p.to.pos) return false;         // same destination square
    return true;

  // doubles, then the both-dice usage obligation (prune first moves that would strand
  // the second die when a full two-die sequence exists), plus the re-form guard.
  function americanMovePhase(state) {
    var dice = state.dice;
    var raw = excludeReform(state, americanRawPlies(state));
    if (raw.length === 0) return [];

    // 1. Mandatory entry: if any entry is possible, only entries are legal.
    var candidates;
    var entries = raw.filter(function (m) { return m.kind === "enter"; });
    if (entries.length) {
      candidates = entries;
    } else if (isDoublesState(state) && raw.some(function (m) { return m.breaksBarrier; })) {
      // 2. Forced blockade break on doubles: a legal breaking move is required.
      candidates = raw.filter(function (m) { return m.breaksBarrier; });
    } else {
      candidates = raw;
    }

    // 3. Both-dice obligation only matters while both dice remain.
    if (dice.length < 2) return dedupePlies(state, candidates);

    var fulls = [];
    var any = false;
    for (var i = 0; i < candidates.length; i++) {
      var p = candidates[i];
      if (p.usesDice.length === 2) { fulls.push(p); any = true; continue; } // sum-entry uses both
      var s2 = simulatePly(state, p);
      var subs = americanRawPlies(s2);
      var subEntries = subs.filter(function (m) { return m.kind === "enter"; });
      if (subEntries.length) subs = subEntries; // mandatory entry applies to the second ply too
      subs = subs.filter(function (q) { return !isReformSequence(state, p, q); });
      if (subs.length) { fulls.push(p); any = true; }
    }
    if (any) return dedupePlies(state, fulls);

    // No ordering uses both dice: offer every single-die option; the player burns one.
    return dedupePlies(state, candidates);
  }

  // ===========================================================================
  var MODES = {
    spanish: { roll: spanishRoll, movePhase: spanishMovePhase },
    american: { roll: americanRoll, movePhase: americanMovePhase }

  // Export
  // ===========================================================================
  var ParchisEngine = {
    newGame: newGame,

    applyMove: applyMove,
    resolveNoMove: resolveNoMove,
    currentPhase: currentPhase,
    pendingBonus: pendingBonus,
    serialize: serialize,
    deserialize: deserialize,
    // Internals exposed for unit testing only.
    _internal: {
      path: path,
      toLinear: toLinear,
      fromLinear: fromLinear,
      findPawn: findPawn,
      pawnsAtSquare: pawnsAtSquare,
      isBarrier: isBarrier,
      computeMove: computeMove,
      canEnter: canEnter,
      buildEnterMove: buildEnterMove,
      americanRawPlies: americanRawPlies,
      SALIDA: SALIDA,

      SEGUROS: SEGUROS,

    G.ui = "showingMoves";
    var opts = moves.map(function (m) {
      var v = valuesOfMove(m);
      return { move: m, value: (m.kind === "enter" ? null : v[0]), label: (m.kind === "enter" ? t("sumEntryChip") : String(v[0])) };
    });
    HUD.moveChoice(curColor(), t("pickDie"), opts, at, function (m) { applyChosen(m); });
  }

  function jsShake(g) {
    if (!g) return;
    var p = curTranslate(g), seq = [7, -7, 5, -5, 3, -3, 0], i = 0;
    var iv = setInterval(function () { setT(g, p.x + seq[i], p.y); i++; if (i >= seq.length) { clearInterval(iv); setT(g, p.x, p.y); } }, 38);
  }
  function hasRawMove(pawn) {
    if (pawn.zone === "casa") return false;
    var c = curColor(), ok = false;
    uniqueVals(G.state.dice).forEach(function (v) { if (Engine._internal.computeMove(G.state, G.state.turn, pawn, v, "advance")) ok = true; });
    return ok;
  }
  function forcedBreakActive() { return G.moves.length > 0 && G.moves.every(function (m) { return m.breaksBarrier; }); }
  function pawnIsBreaker(pawn) {
    if (pawn.zone !== "track" && pawn.zone !== "pasillo") return false;
    return Engine._internal.isBarrier(G.state, curColor(), { zone: pawn.zone, pos: pawn.pos });
  }
  function geometricReason(pawn) {
    var c = curColor(), anyReaches = false, barrier = false, safety = false;
    uniqueVals(G.state.dice).forEach(function (v) {
      var path = Engine._internal.path(c, { zone: pawn.zone, pos: pawn.pos }, v);
      if (path === null) return; anyReaches = true;
      if (path.some(function (sq) { return Engine._internal.isBarrier(G.state, c, sq); })) barrier = true;
      var dest = path[path.length - 1];
      if (G.cfg.mode === "american" && dest.zone === "track" && Board.SEGUROS.indexOf(dest.pos) !== -1) {
        if (Engine._internal.pawnsAtSquare(G.state, c, dest).some(function (o) { return o.color !== c; })) safety = true;
      }
    });
    if (barrier) return t("barrierBlocks");
    if (safety) return t("safetyBlocks");
    if (!anyReaches) return t("exactCount");
    return t("notAllowed");
  }
  function explainIllegal(pawn) {
    jsShake(pawnEl(pawn.id));
    var hasEntry = G.moves.some(function (m) { return m.kind === "enter"; }), msg;
    if (pawn.zone === "casa") msg = hasEntry ? t("notAllowed") : t("needFive");
    else if (hasEntry) msg = t("mustEnter");
    else if (forcedBreakActive() && !pawnIsBreaker(pawn)) msg = G.cfg.mode === "spanish" ? t("mustBreak") : t("doublesMustBreak");
    else if (G.cfg.mode === "american" && hasRawMove(pawn)) msg = t("mustUseBoth");
    else msg = geometricReason(pawn);
    HUD.toast(msg, { kind: "warn", ms: 1600 });
  }

  // ---- persistence ---------------------------------------------------------
  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify({ state: G.state, cfg: G.cfg })); } catch (e) { } }
  function loadSaved() { try { var raw = localStorage.getItem(STORE_KEY); if (!raw) return null; var o = JSON.parse(raw); return (o && o.state && o.cfg) ? o : null; } catch (e) { return null; } }
  function clearSaved() { try { localStorage.removeItem(STORE_KEY); } catch (e) { } }
  function savePrefs() {
    try {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        mode: G.cfg.mode, humanColor: G.cfg.anchor, playerCount: G.cfg.active.length,
        vsMode: G.cfg.vsMode, lang: window.ParchisI18n.getLang(),
        skills: G.cfg.skills, humanName: G.cfg.names[G.cfg.anchor]
        // opponent names are not persisted, so the default computer names always show
      }));
    } catch (e) { }
  }
  function loadPrefs() { try { var raw = localStorage.getItem(PREFS_KEY); return raw ? (JSON.parse(raw) || {}) : {}; } catch (e) { return {}; } }
  function readProfile() {
    try { var raw = localStorage.getItem(PROFILE_KEY); if (!raw) return null; var p = JSON.parse(raw); return (p && typeof p === "object") ? p : null; } catch (e) { return null; }
  }

  // ---- config assembly -----------------------------------------------------
  function buildCfg(setup) {
    var seating = Board.seatingFor(setup.humanColor, setup.playerCount);
    var active = seating.active;
    var humans = setup.vsMode === "local" ? active.slice() : [setup.humanColor];
    var names = {}, skills = {};
    active.forEach(function (col, i) {
      var isHuman = humans.indexOf(col) !== -1;
      var given = setup.names && setup.names[col];
      if (given && given.trim()) names[col] = given.trim();
      else if (col === setup.humanColor) names[col] = t("you");
      else if (setup.vsMode === "local") names[col] = t("playerN", { n: i + 1 });
      else names[col] = CPU_NAMES[i - 1] || t("computerN", { n: i }); // default computer names, in opponent order
      if (!isHuman) skills[col] = (setup.skills && setup.skills[col]) || "intermediate";
    });
    return { mode: setup.mode, vsMode: setup.vsMode, anchor: setup.humanColor, active: active, humans: humans, names: names, skills: skills };
  }

  // ---- lifecycle -----------------------------------------------------------
  function applyLang() { window.ParchisI18n.setLang(getLang()); }
  function getLang() {
    var prefs = loadPrefs();
    return prefs.lang || (readProfile() && null) || "en"; // English default; saved pref wins
  }

  function startNewGame(cfg) {
    G.cfg = cfg;
    applyLang();
    HUD.configureDice(cfg.mode === "spanish" ? 1 : 2);
    var activeSeats = cfg.active.map(seatIdx);
    var state = Engine.newGame({ mode: cfg.mode, seats: activeSeats });
    var inactive = [0, 1, 2, 3].filter(function (i) { return activeSeats.indexOf(i) === -1; });
    state.winners = inactive.slice();     // engine skips these seats; game-over count still works
    state.turn = seatIdx(cfg.anchor);      // the human (or player 1) rolls first
    G.state = state;
    savePrefs(); clearSaved(); save();
    HUD.closeOverlay(); HUD.clearToast();
    advance();
  }
  function continueGame(saved) {
    G.cfg = saved.cfg;
    applyLang();
    HUD.configureDice(G.cfg.mode === "spanish" ? 1 : 2);
    G.state = saved.state;
    HUD.closeOverlay(); HUD.clearToast();
    advance();
  }

  // ---- setup flow ----------------------------------------------------------
  function prefill() {
    var prefs = loadPrefs(), profile = readProfile() || {};
    var validColor = function (c) { return COLORS.indexOf(c) !== -1 ? c : null; };
    var humanName = profile.name || prefs.humanName || (Object.keys(profile).length || prefs.humanName ? "" : "Matt");
    var oppNames = {}, oppSkills = {};
    (profile.opponents || []).forEach(function (o, i) { if (o && o.name) oppNames["op" + i] = o.name; if (o && o.skill) oppSkills["op" + i] = o.skill; });
    return {
      mode: prefs.mode || "american",
      vsMode: prefs.vsMode || "cpu",
      playerCount: prefs.playerCount || 4,
      humanColor: validColor(profile.preferredColor) || prefs.humanColor || "amarillo",
      humanName: humanName,
      profileOpponents: profile.opponents || [],
      prefSkills: prefs.skills || {},
      lang: getLang()
    };
  }
  function showTitle() {
    G.ui = "title";
    var saved = loadSaved();
    var canContinue = !!(saved && Engine.currentPhase(saved.state) !== "gameover");
    HUD.showTitle({
      canContinue: canContinue,
      onVsComputer: function () { HUD.showSetup("cpu", prefill(), onPlay, showTitle); },
      onLocal: function () { HUD.showSetup("local", prefill(), onPlay, showTitle); },
      onContinue: canContinue ? function () { continueGame(saved); } : null,
      onSettings: function () { HUD.openSettings(settingsSnapshot(), onSettingsSaved, showTitle); },
      onRules: function () { HUD.openRules((loadPrefs().mode) || "american", showTitle); }
    });
  }
  function onPlay(setup) { startNewGame(buildCfg(setup)); }

  function settingsSnapshot() { return { lang: window.ParchisI18n.getLang(), sound: false }; }
  function onSettingsSaved(s) {
    window.ParchisI18n.setLang(s.lang || "en");
    try { var p = loadPrefs(); p.lang = s.lang; localStorage.setItem(PREFS_KEY, JSON.stringify(p)); } catch (e) { }
    if (G.state && G.cfg) { syncHud(); render(); if (G.ui === "showingMoves") highlightMoves(G.moves); }
  }

  function onGameOver() {
    clearHighlights(); HUD.setDice([], false); clearSaved();
    var winners = G.state.winners.filter(function (i) { return G.cfg.active.indexOf(color(i)) !== -1; }).map(function (i) { return color(i); });
    var remaining = G.cfg.active.filter(function (c) { return winners.indexOf(c) === -1; });
    HUD.gameover(winners.concat(remaining), namesByColor(), showTitle);
  }
  function namesByColor() { var o = {}; G.cfg.active.forEach(function (c) { o[c] = nameOf(c); }); return o; }

  function bindInput() { svg.addEventListener("pointerdown", onBoardPointer); }

  var Game = {};
  Game.init = function (refs) {
    Engine = window.ParchisEngine; Board = window.ParchisBoard; HUD = window.ParchisHUD; Theme = window.ParchisTheme;
    svg = refs.svg;
    applyLang();
    HUD.build(refs, { onRollTap: onRollTap, onMenu: function () { openInGameMenu(); } });
    // static board backdrop behind the title screen
    G.cfg = { mode: "american", anchor: "amarillo", active: COLORS.slice(), humans: ["amarillo"], names: {}, skills: {} };
    G.state = Engine.newGame({ mode: "american", seats: [0, 1, 2, 3] });
    render();
    bindInput();
    showTitle();
  };
  function openInGameMenu() {
    HUD.openMenu({
      onNewGame: showTitle,
      onSettings: function () { HUD.openSettings(settingsSnapshot(), onSettingsSaved, openInGameMenu); },
      onRules: function () { HUD.openRules(G.cfg ? G.cfg.mode : "american", openInGameMenu); }
    });
  }

  if (typeof window !== "undefined") window.ParchisGame = Game;
})();
</script>
<script>
  window.ParchisGame.init({
    header: document.getElementById("hdr"),
    control: document.getElementById("control"),
    toast: document.getElementById("toast"),
    overlay: document.getElementById("overlay"),
    svg: document.getElementById("board")
  });
</script>
</body>
