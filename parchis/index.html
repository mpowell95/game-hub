<!-- module: engine.js -->
<script>
/*
 * Parchis rules engine (DUAL MODE: Spanish one-die, American two-dice).
 *
 * Pure, deterministic, UI-free. No DOM, no timers, no randomness: the dice values
 * are always an input. Every public function that changes state returns a NEW state
 * and never mutates its input. 11-RULES-DUAL-MODE.md is the source of truth for both
 * rulesets (it supersedes 01-RULES.md); see HANDOFF-R2-1.md for the ambiguities
 * resolved and how.
 *
 * Structure: a mode-independent CORE (coordinate model, occupancy, move computation,
 * bonus queue, winners/rotation, serialization) plus two small mode modules held in
 * MODES: each implements dice/roll handling, entry rules, the extra-roll trigger, the
 * triple-roll penalty, forced-break policy, and (American only) dice sequencing. The
 * public API dispatches to MODES[state.mode] wherever behaviour diverges.
 *
 * Loading: this file is a plain script (not an ES module) so test.html can run it by
 * double-clicking without file:// CORS issues, and the build can inline it into one
 * HTML file. It attaches its API to globalThis/window as `ParchisEngine` and, under
 * Node, to module.exports. See HANDOFF-1.md for why this replaces literal ES exports.
 */
(function () {
  "use strict";

  // ---------------------------------------------------------------------------
  // Board constants (shared by both modes; 11-RULES common core)
  // ---------------------------------------------------------------------------
  var COLORS = ["amarillo", "azul", "rojo", "verde"]; // fixed order: 0..3
  var PAWN_PREFIX = { amarillo: "A", azul: "Z", rojo: "R", verde: "V" };

  var SALIDA = { amarillo: 5, azul: 22, rojo: 39, verde: 56 };  // start squares
  var ENTRY = { amarillo: 68, azul: 17, rojo: 34, verde: 51 };  // last track square before corridor
  var SEGUROS = new Set([5, 12, 17, 22, 29, 34, 39, 46, 51, 56, 63, 68]);
  var TRACK_LEN = 68;
  var PASILLO_LEN = 7;

  // Linear coordinate landmarks (0 = on salida).
  var ENTRY_L = 63;   // every color reaches its entry after exactly 63 track steps
  var META_L = 71;    // 63 track + 7 pasillo + 1 = meta (pasillo position 8)

  function mod(a, n) { return ((a % n) + n) % n; }

  // ===========================================================================
  // CORE: coordinate model (the single source of path logic)
  // ===========================================================================

  // Map a pawn location to its linear coordinate for the given color.
  // Returns null for casa (a casa pawn has no linear position).
  function toLinear(color, zone, pos) {
    if (zone === "track") return mod(pos - SALIDA[color], TRACK_LEN); // valid track L is 0..63
    if (zone === "pasillo") return ENTRY_L + pos;                     // pasillo 1..7 -> 64..70
    if (zone === "meta") return META_L;                              // 71
    return null; // casa
  }

  // Inverse of toLinear: a linear coordinate to a {zone, pos} square.
  function fromLinear(color, t) {
    if (t <= ENTRY_L) return { zone: "track", pos: mod(SALIDA[color] + t - 1, TRACK_LEN) + 1 };
    if (t <= META_L - 1) return { zone: "pasillo", pos: t - ENTRY_L };
    if (t === META_L) return { zone: "meta", pos: null };
    return null; // overshoot
  }

  // Ordered list of squares traversed advancing `steps` from `from` (start excluded,
  // destination included). Returns null on meta overshoot (exact count required).
  function path(color, from, steps) {
    var L = toLinear(color, from.zone, from.pos);
    if (L === null) return null; // casa cannot advance
    var target = L + steps;
    if (target > META_L) return null; // overshoot the meta
    var squares = [];
    for (var t = L + 1; t <= target; t++) squares.push(fromLinear(color, t));
    return squares;
  }

  // ===========================================================================
  // CORE: occupancy helpers
  // ===========================================================================

  // Pawns physically on a square. For a track square, all colors are considered.
  // For a pasillo square, only the mover's color can be there (private corridor).
  function pawnsAtSquare(state, moverColor, sq) {
    var result = [];
    var i, j, player, pawn;
    if (sq.zone === "track") {
      for (i = 0; i < state.players.length; i++) {
        player = state.players[i];
        for (j = 0; j < player.pawns.length; j++) {
          pawn = player.pawns[j];
          if (pawn.zone === "track" && pawn.pos === sq.pos) {
            result.push({ color: player.color, pawn: pawn });
          }
        }
      }
    } else if (sq.zone === "pasillo") {
      for (i = 0; i < state.players.length; i++) {
        if (state.players[i].color !== moverColor) continue;
        player = state.players[i];
        for (j = 0; j < player.pawns.length; j++) {
          pawn = player.pawns[j];
          if (pawn.zone === "pasillo" && pawn.pos === sq.pos) {
            result.push({ color: moverColor, pawn: pawn });
          }
        }
      }
    }
    return result;
  }

  // A barrier (barrera / blockade) is exactly two pawns of the SAME color on one
  // square (seguro or not). Identical in both modes.
  function isBarrier(state, moverColor, sq) {
    var occ = pawnsAtSquare(state, moverColor, sq);
    return occ.length === 2 && occ[0].color === occ[1].color;
  }

  function findPawn(state, id) {
    for (var i = 0; i < state.players.length; i++) {
      var pawns = state.players[i].pawns;
      for (var j = 0; j < pawns.length; j++) {
        if (pawns[j].id === id) return { playerIdx: i, pawn: pawns[j] };
      }
    }
    return null;
  }

  function isOnBoard(pawn) { return pawn.zone === "track" || pawn.zone === "pasillo"; }

  function firstCasaPawn(player) {
    for (var i = 0; i < player.pawns.length; i++) {
      if (player.pawns[i].zone === "casa") return player.pawns[i];
    }
    return null;
  }

  function uniqueValues(arr) {
    var out = [];
    for (var i = 0; i < arr.length; i++) if (out.indexOf(arr[i]) === -1) out.push(arr[i]);
    return out;
  }

  // ===========================================================================
  // CORE: move computation (mode-aware only in the safety-square policy)
  // ===========================================================================

  // Build an advance/bonus move for `pawn` moving `steps`, or null if illegal.
  // Barriers block every intermediate square (own barriers included); the
  // destination must not already hold two pawns. Capture / safety behaviour on the
  // destination depends on the mode:
  //   Spanish  - an opponent on a seguro is shared peacefully (land, no capture);
  //              an opponent on a non-seguro track square is captured.
  //   American - a seguro holding any opponent CANNOT be landed on (safety excludes
  //              opponents); an opponent on a non-seguro track square is captured.
  function computeMove(state, playerIdx, pawn, steps, kind) {
    var color = state.players[playerIdx].color;
    var from = { zone: pawn.zone, pos: pawn.pos };
    var sqs = path(color, from, steps);
    if (sqs === null || sqs.length === 0) return null;

    // Intermediate squares (every square except the destination): a barrier blocks
    // passage. A lone pawn (even an opponent on a seguro) never blocks passage.
    for (var i = 0; i < sqs.length - 1; i++) {
      if (isBarrier(state, color, sqs[i])) return null;
    }

    var dest = sqs[sqs.length - 1];
    var captures = null;
    var breaksBarrier = isBarrier(state, color, from); // leaving a barrier breaks it

    if (dest.zone !== "meta") {
      var occ = pawnsAtSquare(state, color, dest);
      if (occ.length >= 2) return null; // full square: a third pawn can never land
      if (occ.length === 1) {
        var other = occ[0];
        if (dest.zone === "track" && other.color !== color) {
          var onSeguro = SEGUROS.has(dest.pos);
          if (state.mode === "american") {
            if (onSeguro) return null;     // safety excludes opponents: cannot land
            captures = other.pawn.id;      // non-seguro opponent: capture
          } else {                          // spanish
            if (!onSeguro) captures = other.pawn.id; // seguro: coexist, no capture
          }
        }
        // Same color (track or pasillo): landing forms a barrier (legal).
      }
    }

    return {
      pawnId: pawn.id,
      kind: kind,
      amount: steps,
      from: from,
      to: dest,
      captures: captures,
      breaksBarrier: breaksBarrier
    };
  }

  // Can the current player bring a pawn out of casa? Needs a casa pawn and fewer
  // than two of the player's OWN pawns already on the salida. Same in both modes.
  function canEnter(state, playerIdx) {
    var player = state.players[playerIdx];
    var salida = SALIDA[player.color];
    var hasCasa = false;
    var ownOnSalida = 0;
    for (var i = 0; i < player.pawns.length; i++) {
      var p = player.pawns[i];
      if (p.zone === "casa") hasCasa = true;
      else if (p.zone === "track" && p.pos === salida) ownOnSalida++;
    }
    return hasCasa && ownOnSalida < 2;
  }

  // Build the enter move for a casa pawn (placement on the salida). Captures a lone
  // opponent, or the most recently arrived (higher arrivalSeq) of two opponents.
  // The salida-entry capture is the one capture allowed on a seguro, in both modes.
  function buildEnterMove(state, playerIdx, pawn) {
    var color = state.players[playerIdx].color;
    var salida = SALIDA[color];
    var occ = pawnsAtSquare(state, color, { zone: "track", pos: salida });
    var opp = occ.filter(function (o) { return o.color !== color; });
    var captures = null;
    if (opp.length === 1) {
      captures = opp[0].pawn.id;
    } else if (opp.length === 2) {
      captures = (opp[0].pawn.arrivalSeq >= opp[1].pawn.arrivalSeq ? opp[0] : opp[1]).pawn.id;
    }
    return {
      pawnId: pawn.id,
      kind: "enter",
      amount: 5,
      from: { zone: "casa", pos: null },
      to: { zone: "track", pos: salida },
      captures: captures,
      breaksBarrier: false
    };
  }

  // ===========================================================================
  // CORE: state mutation primitives (used by applyMove and the mode roll handlers)
  // ===========================================================================
  function clone(state) { return JSON.parse(JSON.stringify(state)); }

  function sendHome(pawn) {
    pawn.zone = "casa";
    pawn.pos = null;
    pawn.arrivalSeq = 0;
  }

  // Apply movement to the board (advance and bonus moves). Pushes earned bonus
  // amounts (20 capture, 10 meta) into `earned`.
  function applyAdvance(state, playerIdx, pawn, move, events, earned) {
    var color = state.players[playerIdx].color;

    if (move.captures) {
      sendHome(findPawn(state, move.captures).pawn);
    }
    pawn.zone = move.to.zone;
    pawn.pos = move.to.pos;
    pawn.arrivalSeq = ++state.seq;

    if (move.breaksBarrier) {
      events.push({ type: "barrierBroken", pawnId: move.pawnId, at: { zone: move.from.zone, pos: move.from.pos } });
    }

    if (move.to.zone === "meta") {
      events.push({ type: "reachedMeta", pawnId: move.pawnId });
      earned.push(10);
      events.push({ type: "bonusEarned", amount: 10 });
    } else {
      events.push({ type: "moved", pawnId: move.pawnId, to: { zone: move.to.zone, pos: move.to.pos } });
      if (move.captures) {
        events.push({ type: "captured", pawnId: move.pawnId, victimPawnId: move.captures });
        earned.push(20);
        events.push({ type: "bonusEarned", amount: 20 });
      }
      if (isBarrier(state, color, move.to)) {
        events.push({ type: "barrierFormed", color: color, at: { zone: move.to.zone, pos: move.to.pos } });
      }
    }
  }

  function applyEnter(state, playerIdx, pawn, move, events, earned) {
    var color = state.players[playerIdx].color;
    var salida = SALIDA[color];

    if (move.captures) {
      sendHome(findPawn(state, move.captures).pawn);
    }
    pawn.zone = "track";
    pawn.pos = salida;
    pawn.arrivalSeq = ++state.seq;

    events.push({ type: "entered", pawnId: move.pawnId, to: { zone: "track", pos: salida } });
    if (move.captures) {
      events.push({ type: "captured", pawnId: move.pawnId, victimPawnId: move.captures });
      earned.push(20);
      events.push({ type: "bonusEarned", amount: 20 });
    }
    if (isBarrier(state, color, { zone: "track", pos: salida })) {
      events.push({ type: "barrierFormed", color: color, at: { zone: "track", pos: salida } });
    }
  }

  // Remove the used dice from the roll. usesDice holds INDICES into state.dice as it
  // stood when the move was generated; splice from the highest index down so earlier
  // indices stay valid. A bonus move uses no die (usesDice []).
  function consumeDice(state, usesDice) {
    if (!usesDice || !usesDice.length) return;
    var idxs = usesDice.slice().sort(function (a, b) { return b - a; });
    for (var i = 0; i < idxs.length; i++) {
      if (idxs[i] >= 0 && idxs[i] < state.dice.length) state.dice.splice(idxs[i], 1);
    }
  }

  // ===========================================================================
  // CORE: public applyMove
  // ===========================================================================
  function applyMove(state, move) {
    var s = clone(state);
    var events = [];
    var playerIdx = s.turn;
    var pawn = findPawn(s, move.pawnId).pawn;
    var earned = [];
    var wasDoublesBreak = false;

    if (move.kind === "enter") {
      applyEnter(s, playerIdx, pawn, move, events, earned);
      s.lastMovedPawnId = move.pawnId; // a die move
      consumeDice(s, move.usesDice);
    } else if (move.kind === "advance") {
      // Detect an American doubles blockade break BEFORE the board changes, so the
      // re-form prohibition can exclude the sibling's matching move on the next die.
      wasDoublesBreak = (s.mode === "american" && s.pendingReroll && move.breaksBarrier);
      applyAdvance(s, playerIdx, pawn, move, events, earned);
      s.lastMovedPawnId = move.pawnId; // a die move
      consumeDice(s, move.usesDice);
      if (wasDoublesBreak) {
        s.brokenBarrier = { from: { zone: move.from.zone, pos: move.from.pos }, to: { zone: move.to.zone, pos: move.to.pos }, pawnId: move.pawnId };
      }
    } else if (move.kind === "bonus") {
      applyAdvance(s, playerIdx, pawn, move, events, earned);
      // A bonus consumes no die and does not change lastMovedPawnId.
    }

    // Bonus queue: for a bonus move remove the resolved head first, then append newly
    // earned bonuses to the back (FIFO: new bonuses queue behind any already pending).
    if (move.kind === "bonus") {
      s.bonusQueue = s.bonusQueue.slice(1).concat(earned);
    } else {
      s.bonusQueue = s.bonusQueue.concat(earned);
    }

    resolveAfterMove(s, events);
    return { state: s, events: events };
  }

  // After a move settles: record a finish, end the game at three finishers, stay in
  // the bonus phase while bonuses remain, keep the move phase while dice remain,
  // otherwise resolve the roll (re-roll or pass).
  function resolveAfterMove(state, events) {
    var playerIdx = state.turn;
    var player = state.players[playerIdx];
    var allMeta = player.pawns.every(function (p) { return p.zone === "meta"; });
    if (allMeta && state.winners.indexOf(playerIdx) === -1) {
      state.winners.push(playerIdx);
      events.push({ type: "playerFinished", player: playerIdx });
    }
    if (state.winners.length >= 3) {
      events.push({ type: "gameOver", winners: state.winners.slice() });
      return;
    }
    if (state.bonusQueue.length > 0) return; // resolve bonuses first
    if (state.dice.length > 0) return;       // dice still to use: stay in the move phase
    finishTurn(state, events);
  }

  function finishTurn(state, events) {
    var currentFinished = state.winners.indexOf(state.turn) !== -1;
    if (state.pendingReroll && !currentFinished) {
      // Extra roll owed (Spanish 6, American doubles): same player rolls again. Clear
      // the spent dice back to the roll phase; the consecutive counter persists so the
      // triple-roll penalty can be detected.
      state.dice = [];
      state.brokenBarrier = null;
      return;
    }
    state.dice = [];
    state.pendingReroll = false;
    state.sixCount = 0;
    state.doublesCount = 0;
    state.brokenBarrier = null;
    nextTurn(state);
    events.push({ type: "turnPassed", to: state.turn });
  }

  function nextTurn(state) {
    var t = state.turn;
    for (var i = 0; i < state.players.length; i++) {
      t = (t + 1) % state.players.length;
      if (state.winners.indexOf(t) === -1) break;
    }
    state.turn = t;
  }

  // ===========================================================================
  // CORE: public resolveNoMove (no legal move for the remaining dice / bonus)
  // ===========================================================================
  function resolveNoMove(state) {
    var s = clone(state);
    var events = [];
    var phase = currentPhase(state);
    if (phase === "gameover" || phase === "roll") return { state: s, events: events };

    if (phase === "bonus") {
      var forfeited = s.bonusQueue[0];
      s.bonusQueue = s.bonusQueue.slice(1);
      events.push({ type: "bonusForfeited", amount: forfeited });
      // Back to the move phase if dice remain; otherwise finish the turn.
      if (s.bonusQueue.length === 0 && s.dice.length === 0) finishTurn(s, events);
      return { state: s, events: events };
    }

    // Move phase, no legal move for the remaining dice: forfeit them and resolve the
    // turn (the extra-roll rules in finishTurn still apply, e.g. a no-move 6 re-rolls).
    s.dice = [];
    finishTurn(s, events);
    return { state: s, events: events };
  }

  // ===========================================================================
  // CORE: winners / phase / bonus queries, new game, serialization
  // ===========================================================================
  function currentPhase(state) {
    if (state.winners.length >= 3) return "gameover";
    if (state.bonusQueue.length > 0) return "bonus";
    if (state.dice.length > 0) return "move"; // dice rolled, still to be used
    return "roll";
  }

  function pendingBonus(state) {
    return state.bonusQueue.length > 0 ? state.bonusQueue[0] : null;
  }

  // newGame(config): config is { mode, seats }. Tolerant of the legacy array form
  // newGame(humanSeats) used by the round 1 UI, which maps to American mode (the
  // shipped two-dice behaviour) until the setup flow in Phase R2-3 passes a mode.
  function newGame(config) {
    var mode, seats;
    if (Array.isArray(config)) {
      seats = config; mode = "american";
    } else if (config && typeof config === "object") {
      mode = config.mode || "american";
      seats = config.seats || config.humanSeats || [];
    } else {
      mode = "american"; seats = [];
    }
    if (mode !== "spanish" && mode !== "american") mode = "american";

    var players = COLORS.map(function (color) {
      var pawns = [];
      for (var n = 1; n <= 4; n++) {
        pawns.push({ id: PAWN_PREFIX[color] + n, zone: "casa", pos: null, arrivalSeq: 0 });
      }
      return { color: color, pawns: pawns };
    });
    return {
      mode: mode,             // "spanish" | "american", fixed for the life of the game
      players: players,
      turn: 0,
      dice: [],               // unused dice of the current roll (empty in the roll phase)
      sixCount: 0,            // Spanish: consecutive sixes this turn (third triggers the penalty)
      doublesCount: 0,       // American: consecutive doubles this turn (third triggers the penalty)
      bonusQueue: [],
      pendingReroll: false,   // an extra roll is owed after the current roll resolves
      brokenBarrier: null,    // American: the blockade broken by the first doubles die (re-form guard)
      lastMovedPawnId: null,  // Spanish three-sixes target
      seq: 0,                 // global arrival counter (for "most recently placed" rulings)
      winners: [],            // player indices in finish order
      seats: seats ? seats.slice() : []
    };
  }

  function serialize(state) { return JSON.stringify(state); }
  function deserialize(json) { return JSON.parse(json); } // mode round-trips as a plain field

  // ===========================================================================
  // CORE: public legalMoves (dispatches the move phase to the active mode)
  // ===========================================================================
  function legalMoves(state) {
    var phase = currentPhase(state);
    if (phase === "gameover" || phase === "roll") return [];

    var playerIdx = state.turn;
    var player = state.players[playerIdx];

    // Bonus phase (both modes): any on-board pawn may take the head bonus (consumes no
    // die). The mode still governs the destination via computeMove's safety policy.
    if (phase === "bonus") {
      var amount = state.bonusQueue[0];
      var moves = [];
      for (var i = 0; i < player.pawns.length; i++) {
        var pawn = player.pawns[i];
        if (!isOnBoard(pawn)) continue;
        var m = computeMove(state, playerIdx, pawn, amount, "bonus");
        if (m) { m.usesDice = []; moves.push(m); }
      }
      return moves;
    }

    // Move phase: mode specific.
    return MODES[state.mode].movePhase(state);
  }

  // ===========================================================================
  // CORE: public applyRoll (records a roll; dispatches to the active mode)
  // ===========================================================================
  // applyRoll(state, dice): dice is [d] (spanish) or [d1, d2] (american). Tolerant of
  // the legacy variadic applyRoll(state, d1, d2) form used by the round 1 UI/AI.
  function applyRoll(state, dice, maybeD2) {
    var s = clone(state);
    var events = [];
    if (currentPhase(state) !== "roll") return { state: s, events: events };
    var arr = Array.isArray(dice) ? dice.slice() : (maybeD2 == null ? [dice] : [dice, maybeD2]);
    s.brokenBarrier = null;
    MODES[s.mode].roll(s, arr, events);
    return { state: s, events: events };
  }

  // ===========================================================================
  // SPANISH MODE (one die) - 11-RULES section SPANISH
  // ===========================================================================

  // Record a one-die roll. A 6 owes a re-roll and counts toward the three-sixes
  // penalty; the third consecutive 6 is not moved (penalty applied here, turn ends).
  function spanishRoll(s, arr, events) {
    var d = arr[0];
    var isSix = (d === 6);
    if (isSix && s.sixCount >= 2) { // third consecutive six
      applyThreeSixesPenalty(s, events);
      return;
    }
    s.dice = [d];
    if (isSix) s.sixCount += 1;
    s.pendingReroll = isSix;
    events.push({ type: "rolled", dice: [d], mode: "spanish" });
  }

  // The three-sixes penalty sends the pawn moved on the second six (lastMovedPawnId)
  // back to casa, unless it is safe in the pasillo or on the meta.
  function applyThreeSixesPenalty(s, events) {
    var sent = null;
    if (s.lastMovedPawnId != null) {
      var f = findPawn(s, s.lastMovedPawnId);
      if (f && f.pawn.zone === "track") { // pasillo and meta are immune
        sendHome(f.pawn);
        sent = f.pawn.id;
      }
    }
    events.push({ type: "threeSixesPenalty", pawnId: sent });
    s.dice = [];
    s.bonusQueue = [];
    s.pendingReroll = false;
    s.sixCount = 0;
    s.doublesCount = 0;
    s.brokenBarrier = null;
    nextTurn(s);
    events.push({ type: "turnPassed", to: s.turn });
  }

  // Spanish move phase: exactly one die in play.
  function spanishMovePhase(state) {
    var playerIdx = state.turn;
    var player = state.players[playerIdx];
    var d = state.dice[0];
    var zeroCasa = player.pawns.every(function (p) { return p.zone !== "casa"; });
    var effective = (d === 6 && zeroCasa) ? 7 : d; // 6-as-7 only when every pawn is out

    // Mandatory entry on a 5: if entering is legal it is the only permitted move.
    if (d === 5 && canEnter(state, playerIdx)) {
      var e = buildEnterMove(state, playerIdx, firstCasaPawn(player));
      e.usesDice = [0];
      return [e];
    }

    // Advance moves for on-board pawns.
    var adv = [];
    for (var i = 0; i < player.pawns.length; i++) {
      var pawn = player.pawns[i];
      if (!isOnBoard(pawn)) continue;
      var m = computeMove(state, playerIdx, pawn, effective, "advance");
      if (m) { m.usesDice = [0]; adv.push(m); }
    }

    // Forced barrier break on a 6 (or the 6-as-7): if any barrier pawn can legally
    // move, restrict the legal moves to those barrier-breaking moves.
    if (d === 6) {
      var breakers = adv.filter(function (m) { return m.breaksBarrier; });
      if (breakers.length) return breakers;
    }
    return adv;
  }

  // ===========================================================================
  // AMERICAN MODE (two dice) - 11-RULES section AMERICAN
  // ===========================================================================

  // Record a two-dice roll. Doubles owe a re-roll and count toward the three-doubles
  // penalty; the third consecutive doubles is not moved (penalty applied here).
  function americanRoll(s, arr, events) {
    var d1 = arr[0], d2 = arr[1];
    var doubles = (d1 === d2);
    if (doubles && s.doublesCount >= 2) { // third consecutive doubles
      applyThreeDoublesPenalty(s, events);
      return;
    }
    s.dice = [d1, d2];
    if (doubles) s.doublesCount += 1;
    s.pendingReroll = doubles;
    events.push({ type: "rolled", dice: [d1, d2], doubles: doubles, mode: "american" });
  }

  // The three-doubles penalty sends the current player's pawn CLOSEST TO HOME on the
  // shared track (highest linear progress) back to the nest. Home row and meta are
  // always immune; a player with no track pawn loses nothing.
  function applyThreeDoublesPenalty(s, events) {
    var player = s.players[s.turn];
    var best = null, bestL = -1;
    for (var i = 0; i < player.pawns.length; i++) {
      var p = player.pawns[i];
      if (p.zone === "track") {
        var L = toLinear(player.color, "track", p.pos);
        if (L > bestL) { bestL = L; best = p; }
      }
    }
    var sent = null;
    if (best) { sendHome(best); sent = best.id; }
    events.push({ type: "threeDoublesPenalty", pawnId: sent });
    s.dice = [];
    s.bonusQueue = [];
    s.pendingReroll = false;
    s.sixCount = 0;
    s.doublesCount = 0;
    s.brokenBarrier = null;
    nextTurn(s);
    events.push({ type: "turnPassed", to: s.turn });
  }

  function isDoublesState(state) { return state.mode === "american" && state.pendingReroll === true; }

  // Every legal single ply given the remaining dice, WITHOUT obligation pruning: one
  // move per (remaining die, on-board pawn) advance, one entry per die showing 5, and
  // one sum-entry when both dice remain and sum to 5. usesDice holds die indices.
  function americanRawPlies(state) {
    var playerIdx = state.turn;
    var player = state.players[playerIdx];
    var dice = state.dice;
    var plies = [];
    var di, i, v, pawn, m;
    for (di = 0; di < dice.length; di++) {
      v = dice[di];
      for (i = 0; i < player.pawns.length; i++) {
        pawn = player.pawns[i];
        if (!isOnBoard(pawn)) continue;
        m = computeMove(state, playerIdx, pawn, v, "advance");
        if (m) { m.usesDice = [di]; plies.push(m); }
      }
      if (v === 5 && canEnter(state, playerIdx)) {
        var e = buildEnterMove(state, playerIdx, firstCasaPawn(player));
        e.usesDice = [di]; plies.push(e);
      }
    }
    if (dice.length === 2 && canEnter(state, playerIdx) && (dice[0] + dice[1]) === 5) {
      var se = buildEnterMove(state, playerIdx, firstCasaPawn(player));
      se.usesDice = [0, 1]; plies.push(se);
    }
    return plies;
  }

  // Collapse plies that are indistinguishable in effect (same pawn/kind/destination/
  // capture and the same die value(s), differing only in which equal die is spent).
  function dedupePlies(state, plies) {
    var seen = {}, out = [];
    for (var i = 0; i < plies.length; i++) {
      var p = plies[i];
      var vals = p.usesDice.map(function (idx) { return state.dice[idx]; }).sort(function (a, b) { return a - b; });
      var key = p.pawnId + "|" + p.kind + "|" + p.to.zone + "|" + p.to.pos + "|" + (p.captures || "") + "|" + vals.join(",");
      if (!seen[key]) { seen[key] = true; out.push(p); }
    }
    return out;
  }

  // Lightweight ply application used only by the both-dice sequence search: moves the
  // pawn and consumes the die, ignoring bonuses and turn resolution, so the remaining
  // die's legality can be tested on the resulting board.
  function simulatePly(state, ply) {
    var s = clone(state);
    var pawn = findPawn(s, ply.pawnId).pawn;
    if (ply.captures) sendHome(findPawn(s, ply.captures).pawn);
    if (ply.kind === "enter") {
      pawn.zone = "track"; pawn.pos = SALIDA[s.players[s.turn].color];
    } else {
      pawn.zone = ply.to.zone; pawn.pos = ply.to.pos;
    }
    pawn.arrivalSeq = ++s.seq;
    consumeDice(s, ply.usesDice);
    return s;
  }

  // Would playing `q` after `p` re-form, with the two equal dice, the same blockade
  // `p` just broke (both original members from one square onto one new square)?
  function isReformSequence(state, p, q) {
    if (!isDoublesState(state)) return false;
    if (!p.breaksBarrier) return false;
    if (p.kind === "enter" || q.kind === "enter") return false;
    if (q.pawnId === p.pawnId) return false;
    if (q.from.zone !== p.from.zone || q.from.pos !== p.from.pos) return false; // same origin square
    if (q.to.zone !== p.to.zone || q.to.pos !== p.to.pos) return false;         // same destination square
    return true;
  }

  // Drop the move that would re-form (with the remaining equal die) the blockade the
  // first die already broke this turn. Enforced on the real second ply via the

  function excludeReform(state, plies) {

    pt.x = src.clientX; pt.y = src.clientY;
    var ctm = svg.getScreenCTM(); if (!ctm) return null;
    var p = pt.matrixTransform(ctm.inverse()), off = groupOffset();
    return { x: p.x - off, y: p.y - off };
  }
  function onBoardPointer(evt) {
    G.kbd = false;
    if (G.ui !== "showingMoves" || isAI(G.state.turn)) return;
    var p = tapPoint(evt); if (!p) return; evt.preventDefault();
    var place = Board.pawnPlacement(CO(), G.state), TH = cell() * 1.5;
    // nearest legal-move destination to the tap
    var bestDest = null, bestDestD = Infinity;
    G.moves.forEach(function (m) { var d = destCenter(m); if (!d) return; var dd = dist(p, d); if (dd < bestDestD) { bestDestD = dd; bestDest = m; } });
    // nearest current-player pawn to the tap
    var cur = G.state.players[G.state.turn], tapped = null, tapD = Infinity;
    cur.pawns.forEach(function (pw) { var c = place[pw.id]; if (!c) return; var d = dist(p, c); if (d < tapD) { tapD = d; tapped = pw; } });
    // A tap ON a pawn wins when the pawn is at least as close as any destination. This is
    // what makes a pawn with several die options (e.g. a 6 and a 1) open the picker instead
    // of silently taking the adjacent short-die destination that sits one cell away.
    if (tapped && tapD <= TH && tapD <= bestDestD) { selectPawn(tapped, place); return; }
    // Otherwise a direct tap on a highlighted destination applies that exact move.
    if (bestDest && bestDestD <= TH) { applyChosen(bestDest); return; }
    // Pawn tapped but a destination was marginally closer yet out of range: still select it.
    if (tapped && tapD <= TH) { selectPawn(tapped, place); }
  }
  function selectPawn(pawn, place) {
    var movesFor = G.moves.filter(function (m) { return m.pawnId === pawn.id; });
    if (movesFor.length === 0) { explainIllegal(pawn); return; }
    if (movesFor.length === 1) { applyChosen(movesFor[0]); return; }
    showMoveChoice(pawn, movesFor, place[pawn.id]);
  }

  function valuesOfMove(m) { return (m.usesDice || []).map(function (i) { return G.state.dice[i]; }); }
  function showMoveChoice(pawn, moves, at) {
    G.ui = "showingMoves";
    var opts = moves.map(function (m) {
      var v = valuesOfMove(m);
      return { move: m, value: (m.kind === "enter" ? null : v[0]), label: (m.kind === "enter" ? t("sumEntryChip") : String(v[0])) };
    });
    HUD.moveChoice(curColor(), t("pickDie"), opts, at, function (m) { applyChosen(m); });
  }

  function jsShake(g) {
    if (!g) return;
    var p = curTranslate(g), seq = [7, -7, 5, -5, 3, -3, 0], i = 0;
    // Unscaled: this shake is a direct response to a tap, not part of the turn's pacing.
    var iv = setInterval(function () { setT(g, p.x + seq[i], p.y); i++; if (i >= seq.length) { clearInterval(iv); setT(g, p.x, p.y); } }, 38);
  }
  function hasRawMove(pawn) {
    if (pawn.zone === "casa") return false;
    var c = curColor(), ok = false;
    uniqueVals(G.state.dice).forEach(function (v) { if (Engine._internal.computeMove(G.state, G.state.turn, pawn, v, "advance")) ok = true; });
    return ok;
  }
  function forcedBreakActive() { return G.moves.length > 0 && G.moves.every(function (m) { return m.breaksBarrier; }); }
  function pawnIsBreaker(pawn) {
    if (pawn.zone !== "track" && pawn.zone !== "pasillo") return false;
    return Engine._internal.isBarrier(G.state, curColor(), { zone: pawn.zone, pos: pawn.pos });
  }
  function geometricReason(pawn) {
    var c = curColor(), anyReaches = false, barrier = false, safety = false;
    uniqueVals(G.state.dice).forEach(function (v) {
      var path = Engine._internal.path(c, { zone: pawn.zone, pos: pawn.pos }, v);
      if (path === null) return; anyReaches = true;
      if (path.some(function (sq) { return Engine._internal.isBarrier(G.state, c, sq); })) barrier = true;
      var dest = path[path.length - 1];
      if (G.cfg.mode === "american" && dest.zone === "track" && Board.SEGUROS.indexOf(dest.pos) !== -1) {
        if (Engine._internal.pawnsAtSquare(G.state, c, dest).some(function (o) { return o.color !== c; })) safety = true;
      }
    });
    if (barrier) return t("barrierBlocks");
    if (safety) return t("safetyBlocks");
    if (!anyReaches) return t("exactCount");
    return t("notAllowed");
  }
  function explainIllegal(pawn) {
    jsShake(pawnEl(pawn.id));
    var hasEntry = G.moves.some(function (m) { return m.kind === "enter"; }), msg;
    if (pawn.zone === "casa") msg = hasEntry ? t("notAllowed") : t("needFive");
    else if (hasEntry) msg = t("mustEnter");
    else if (forcedBreakActive() && !pawnIsBreaker(pawn)) msg = G.cfg.mode === "spanish" ? t("mustBreak") : t("doublesMustBreak");
    else if (G.cfg.mode === "american" && hasRawMove(pawn)) msg = t("mustUseBoth");
    else msg = geometricReason(pawn);
    HUD.toast(msg, { kind: "warn", ms: ms(1600) });
  }

  // ---- persistence ---------------------------------------------------------
  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify({ state: G.state, cfg: G.cfg })); } catch (e) { } }
  function loadSaved() { try { var raw = localStorage.getItem(STORE_KEY); if (!raw) return null; var o = JSON.parse(raw); return (o && o.state && o.cfg) ? o : null; } catch (e) { return null; } }
  function clearSaved() { try { localStorage.removeItem(STORE_KEY); } catch (e) { } }
  function savePrefs() {
    try {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        mode: G.cfg.mode, humanColor: G.cfg.anchor, playerCount: G.cfg.active.length,
        vsMode: G.cfg.vsMode, lang: window.ParchisI18n.getLang(), theme: getTheme(),
        speed: Speed.get(), // this rewrites the whole prefs blob, so carry the speed over
        skills: G.cfg.skills, humanName: G.cfg.names[G.cfg.anchor]
        // opponent names are not persisted, so the default computer names always show
      }));
    } catch (e) { }
  }
  function loadPrefs() { try { var raw = localStorage.getItem(PREFS_KEY); return raw ? (JSON.parse(raw) || {}) : {}; } catch (e) { return {}; } }
  function readProfile() {
    try { var raw = localStorage.getItem(PROFILE_KEY); if (!raw) return null; var p = JSON.parse(raw); return (p && typeof p === "object") ? p : null; } catch (e) { return null; }
  }

  // ---- config assembly -----------------------------------------------------
  function buildCfg(setup) {
    var seating = Board.seatingFor(setup.humanColor, setup.playerCount);
    var active = seating.active;
    var humans = setup.vsMode === "local" ? active.slice() : [setup.humanColor];
    var names = {}, skills = {};
    active.forEach(function (col, i) {
      var isHuman = humans.indexOf(col) !== -1;
      var given = setup.names && setup.names[col];
      if (given && given.trim()) names[col] = given.trim();
      else if (col === setup.humanColor) names[col] = t("you");
      else if (setup.vsMode === "local") names[col] = t("playerN", { n: i + 1 });
      else names[col] = CPU_NAMES[i - 1] || t("computerN", { n: i }); // default computer names, in opponent order
      if (!isHuman) skills[col] = (setup.skills && setup.skills[col]) || "intermediate";
    });
    return { mode: setup.mode, vsMode: setup.vsMode, anchor: setup.humanColor, active: active, humans: humans, names: names, skills: skills };
  }

  // ---- lifecycle -----------------------------------------------------------
  function applyLang() { window.ParchisI18n.setLang(getLang()); refreshStaticText(); }
  // Chrome that is built once (header title, board label) and so misses a language change.
  function refreshStaticText() {
    if (svg) svg.setAttribute("aria-label", t("boardLabel"));
    if (HUD && HUD.refreshStaticText) HUD.refreshStaticText();
  }
  function getLang() {
    var prefs = loadPrefs();
    return prefs.lang || (readProfile() && null) || "en"; // English default; saved pref wins
  }

  function startNewGame(cfg) {
    G.cfg = cfg;
    applyLang();
    HUD.configureDice(cfg.mode === "spanish" ? 1 : 2);
    var activeSeats = cfg.active.map(seatIdx);
    var state = Engine.newGame({ mode: cfg.mode, seats: activeSeats });
    var inactive = [0, 1, 2, 3].filter(function (i) { return activeSeats.indexOf(i) === -1; });
    state.winners = inactive.slice();     // engine skips these seats; game-over count still works
    state.turn = seatIdx(cfg.anchor);      // the human (or player 1) rolls first
    G.state = state;
    savePrefs(); clearSaved(); save();
    HUD.closeOverlay(); HUD.clearToast();
    advance();
  }
  function continueGame(saved) {
    G.cfg = saved.cfg;
    applyLang();
    HUD.configureDice(G.cfg.mode === "spanish" ? 1 : 2);
    G.state = saved.state;
    HUD.closeOverlay(); HUD.clearToast();
    advance();
  }

  // ---- setup flow ----------------------------------------------------------
  function prefill() {
    var prefs = loadPrefs(), profile = readProfile() || {};
    var validColor = function (c) { return COLORS.indexOf(c) !== -1 ? c : null; };
    var humanName = profile.name || prefs.humanName || (Object.keys(profile).length || prefs.humanName ? "" : "Matt");
    var oppNames = {}, oppSkills = {};
    (profile.opponents || []).forEach(function (o, i) { if (o && o.name) oppNames["op" + i] = o.name; if (o && o.skill) oppSkills["op" + i] = o.skill; });
    return {
      mode: prefs.mode || "american",
      vsMode: prefs.vsMode || "cpu",
      playerCount: prefs.playerCount || 4,
      humanColor: validColor(profile.preferredColor) || prefs.humanColor || "amarillo",
      humanName: humanName,
      profileOpponents: profile.opponents || [],
      prefSkills: prefs.skills || {},
      challenge: { live: chLive(), done: chDone() },
      lang: getLang()
    };
  }
  function showTitle() {
    G.ui = "title";
    var saved = loadSaved();
    var canContinue = !!(saved && Engine.currentPhase(saved.state) !== "gameover");
    HUD.showTitle({
      canContinue: canContinue,
      onVsComputer: function () { HUD.showSetup("cpu", prefill(), onPlay, showTitle); },
      onLocal: function () { HUD.showSetup("local", prefill(), onPlay, showTitle); },
      onContinue: canContinue ? function () { continueGame(saved); } : null,
      onSettings: function () { HUD.openSettings(settingsSnapshot(), onSettingsSaved, showTitle); },
      onRules: function () { HUD.openRules((loadPrefs().mode) || "american", showTitle); },
      onExit: function () { window.location.href = "../"; } // back to the game hub
    });
  }
  function onPlay(setup) { startNewGame(buildCfg(setup)); }

  function settingsSnapshot() { return { lang: window.ParchisI18n.getLang(), theme: getTheme(), speed: Speed.get(), sound: false }; }
  function onSettingsSaved(s) {
    window.ParchisI18n.setLang(s.lang || "en");
    refreshStaticText();
    var theme = s.theme === "light" ? "light" : "dark";
    applyTheme(theme);
    var speed = Speed.set(s.speed); // normalises an unknown value back to the default
    try { var p = loadPrefs(); p.lang = s.lang; p.theme = theme; p.speed = speed; localStorage.setItem(PREFS_KEY, JSON.stringify(p)); } catch (e) { }
    if (G.state && G.cfg) { syncHud(); render(); if (G.ui === "showingMoves") highlightMoves(G.moves); }
  }
  function getTheme() { return loadPrefs().theme === "dark" ? "dark" : "light"; } // light default (matches the mockup)
  function getSpeed() { return loadPrefs().speed || Speed.DEFAULT; }
  function applyTheme(theme) {
    if (typeof document === "undefined") return;
    document.body.classList.toggle("pc-light", theme === "light");
    var m = document.querySelector('meta[name="theme-color"]');
    if (m) m.setAttribute("content", theme === "light" ? "#EFE9DA" : "#241d17");
  }

  // Hidden challenge, gated in the hub. Self-contained because the built single file
  // cannot import modules; mirrors js/challenge crypt and secrets. Inert unless the
  // gamehub.profile name matches the trigger hash. No plaintext name, answer, or code.
  var CH_TRIGGERS = ["1cabdac0", "39b28c49"], CH_SALT = "gh-v1-9c3f", CH_XK = "gh-xk-7q2z9";
  var CH_CODE = "NykANS55dlx2O2ov";
  function chNorm(s) { return String(s == null ? "" : s).trim().toLowerCase(); }
  function chHash(str) {
    var s = CH_SALT + String(str == null ? "" : str), h = 0x811c9dc5, i;
    for (i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 0x01000193); }
    return (h >>> 0).toString(16).padStart(8, "0");
  }
  function chObf(str) {
    var s = String(str == null ? "" : str), o = "", i;
    for (i = 0; i < s.length; i++) o += String.fromCharCode((s.charCodeAt(i) ^ CH_XK.charCodeAt(i % CH_XK.length)) & 0xff);
    try { return btoa(o); } catch (e) { return ""; }
  }
  function chDeobf(b) {
    try {
      var bin = atob(String(b == null ? "" : b)), o = "", i;
      for (i = 0; i < bin.length; i++) o += String.fromCharCode(bin.charCodeAt(i) ^ CH_XK.charCodeAt(i % CH_XK.length));
      return o;
    } catch (e) { return ""; }
  }
  function chEsc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function chActive() { var p = readProfile(); return !!p && CH_TRIGGERS.indexOf(chHash(chNorm(p.name))) !== -1; }
  function chDone() { try { var raw = localStorage.getItem("gamehub.challenge"); var st = raw ? JSON.parse(chDeobf(raw)) : null; return !!(st && st.wins && st.wins.parchis); } catch (e) { return false; } }
  function chLive() { return chActive() && !chDone(); }
  function chRecordWin() {
    try {
      var raw = localStorage.getItem("gamehub.challenge");
      var st = raw ? JSON.parse(chDeobf(raw)) : null;
      if (!st || typeof st !== "object") st = {};
      if (!st.wins || typeof st.wins !== "object") st.wins = {};
      st.wins.parchis = true; st.v = 1; st.updatedAt = new Date().toISOString();
      localStorage.setItem("gamehub.challenge", chObf(JSON.stringify(st)));
    } catch (e) {}
  }
  function chShowReveal(code, label) {
    var prev = document.getElementById("pa-ch-reveal"); if (prev) prev.remove();
    var el = document.createElement("div");
    el.id = "pa-ch-reveal";
    el.setAttribute("role", "dialog"); el.setAttribute("aria-modal", "true"); el.setAttribute("aria-label", "Secret code earned");
    el.style.cssText = "position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;";
    el.innerHTML =
      '<div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(30,26,5,.86),rgba(6,8,12,.96));"></div>' +
      '<div style="position:relative;max-width:420px;margin:0 18px;text-align:center;background:#12151c;border:1px solid #f2b705;border-radius:20px;padding:28px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);">' +
      '<p style="margin:8px 0 0;text-transform:uppercase;letter-spacing:.14em;font-size:.78rem;font-weight:800;color:#9aa7bd;">Your code</p>' +
      '<div style="font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:800;font-size:1.05rem;letter-spacing:.04em;color:#2a2200;background:#f2b705;border-radius:12px;padding:13px 12px;margin:6px 0 14px;white-space:nowrap;overflow-x:auto;">' + chEsc(code) + '</div>' +
      '<div style="display:flex;gap:10px;justify-content:center;">' +
      '<button id="pa-ch-copy" style="flex:1;font:inherit;font-weight:800;border:0;border-radius:11px;padding:14px 16px;cursor:pointer;background:#f2b705;color:#2a2200;">Copy</button>' +
      '<button id="pa-ch-close" style="flex:1;font:inherit;font-weight:700;border:1px solid #2c3340;border-radius:11px;padding:14px 16px;cursor:pointer;background:transparent;color:#eef2f8;">Close</button>' +
      '</div><p id="pa-ch-msg" style="margin:10px 0 0;min-height:1.1em;font-size:.85rem;font-weight:700;color:#9aa7bd;"></p></div>';
    document.body.appendChild(el);
    el.querySelector("#pa-ch-close").addEventListener("click", function () { el.remove(); });
    el.querySelector("#pa-ch-copy").addEventListener("click", function () {
      var msg = el.querySelector("#pa-ch-msg");
      try { navigator.clipboard.writeText(code).then(function () { msg.textContent = "Copied."; }, function () { msg.textContent = code; }); }
      catch (e) { msg.textContent = code; }
    });
  }
  function challengeOnGameOver(winnerColor) {
    try {
      if (!chLive()) return;
      var humans = G.cfg.humans || [], active = G.cfg.active || [];
      var humanWon = winnerColor === G.cfg.anchor || humans.indexOf(winnerColor) !== -1;
      var aiColors = active.filter(function (c) { return humans.indexOf(c) === -1; });
      var okSkill = aiColors.length === 3 && aiColors.every(function (c) {
        var s = (G.cfg.skills && G.cfg.skills[c]) || "intermediate";
        return s === "intermediate" || s === "pro" || s === "expert";
      });
      if (humanWon && G.cfg.mode === "spanish" && okSkill) { chRecordWin(); chShowReveal(chDeobf(CH_CODE), "Parchis"); }
    } catch (e) {}
  }

  function onGameOver() {
    clearHighlights(); HUD.setDice([], false); clearSaved();
    var winners = G.state.winners.filter(function (i) { return G.cfg.active.indexOf(color(i)) !== -1; }).map(function (i) { return color(i); });
    var remaining = G.cfg.active.filter(function (c) { return winners.indexOf(c) === -1; });
    HUD.gameover(winners.concat(remaining), namesByColor(), showTitle);
    challengeOnGameOver(winners[0]);
  }
  function namesByColor() { var o = {}; G.cfg.active.forEach(function (c) { o[c] = nameOf(c); }); return o; }

  // Enter / Space on a focused piece plays it, exactly as a tap does: one legal move
  // applies immediately, several open the die picker (whose chips are real buttons).
  function onBoardKey(evt) {
    if (evt.key !== "Enter" && evt.key !== " " && evt.key !== "Spacebar") return;
    if (G.ui !== "showingMoves" || isAI(G.state.turn)) return;
    var host = evt.target && evt.target.closest ? evt.target.closest("[data-pawn-id]") : null;
    if (!host) return;
    var pawn = ownPawn(host.getAttribute("data-pawn-id"));
    if (!pawn) return;
    evt.preventDefault();
    G.kbd = true;
    selectPawn(pawn, Board.pawnPlacement(CO(), G.state));
  }
  function bindInput() {
    svg.addEventListener("pointerdown", onBoardPointer);
    svg.addEventListener("keydown", onBoardKey);
    document.addEventListener("keydown", function (e) { if (e.key === "Tab") G.kbd = true; });
  }

  var Game = {};
  Game.init = function (refs) {
    Engine = window.ParchisEngine; Board = window.ParchisBoard; HUD = window.ParchisHUD; Theme = window.ParchisTheme;
    Speed = window.ParchisSpeed;
    svg = refs.svg;
    applyLang();
    applyTheme(getTheme());
    Speed.set(getSpeed());
    HUD.build(refs, { onRollTap: onRollTap, onMenu: function () { openInGameMenu(); } });
    // static board backdrop behind the title screen
    G.cfg = { mode: "american", anchor: "amarillo", active: COLORS.slice(), humans: ["amarillo"], names: {}, skills: {} };
    G.state = Engine.newGame({ mode: "american", seats: [0, 1, 2, 3] });
    render();
    bindInput();
    // Challenge mode: open straight on the (locked) new-game setup with the "Begin
    // challenge" bar, skipping the title menu, so the mission is the first thing shown.
    if (chLive()) HUD.showSetup("cpu", prefill(), onPlay, showTitle);
    else showTitle();
  };
  function openInGameMenu() {
    HUD.openMenu({
      onNewGame: showTitle,
      onSettings: function () { HUD.openSettings(settingsSnapshot(), onSettingsSaved, openInGameMenu); },
      onRules: function () { HUD.openRules(G.cfg ? G.cfg.mode : "american", openInGameMenu); }
    });
  }

  if (typeof window !== "undefined") window.ParchisGame = Game;
})();
</script>
<script>
  window.ParchisGame.init({
    header: document.getElementById("hdr"),
    control: document.getElementById("control"),
    toast: document.getElementById("toast"),
    overlay: document.getElementById("overlay"),
    live: document.getElementById("live"),
    svg: document.getElementById("board")
  });
</script>
</body>
