  <polygon points="384,84 435,175 333,175" fill="#1F5FA8" stroke="#123A6B" stroke-width="9" stroke-linejoin="round"/>
  <rect x="340" y="340" width="88" height="88" rx="12" fill="#E0532F" stroke="#8A2E16" stroke-width="9"/>
  <polygon points="128,331 181,384 128,437 75,384" fill="#178A7A" stroke="#0B4A42" stroke-width="9" stroke-linejoin="round"/>
</svg>
