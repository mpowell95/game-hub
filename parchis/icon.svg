<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Parchís">
  <rect width="512" height="512" rx="104" fill="#6E4A29"/>
  <rect x="28" y="28" width="456" height="456" rx="78" fill="#F4EAD2"/>
  <!-- cross corridors, light-tinted per color, pointing to the centre -->
  <rect x="224" y="92" width="64" height="164" fill="#A6C4E4"/>
  <rect x="256" y="224" width="164" height="64" fill="#F3B39C"/>
  <rect x="224" y="256" width="64" height="164" fill="#93CCC2"/>
  <rect x="92" y="224" width="164" height="64" fill="#FBE7A0"/>
  <rect x="224" y="224" width="64" height="64" rx="10" fill="#EFE4C7"/>
  <!-- centre pinwheel accent -->
  <circle cx="256" cy="256" r="17" fill="#F4EAD2" stroke="#6E4A29" stroke-width="5"/>
  <!-- four players: shape + colour in each casa corner (amarillo TL, azul TR, rojo BR, verde BL) -->
